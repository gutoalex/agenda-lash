<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda da Le - Ls Cílios</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --rose: #e11d48;
            --rose-light: #fff1f4;
            --rose-mid: #fda4af;
            --plum: #6d28d9;
            --plum-light: #f5f3ff;
            --ink: #1e1b2e;
            --ink-mid: #6b6880;
            --surface: #fdfcff;
            --border: #ede9f6;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'DM Sans', sans-serif; 
            background: var(--surface); 
            margin: 0; padding: 0;
            color: var(--ink);
        }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        /* Animações */
        @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        @keyframes scaleIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
        @keyframes slideUp { from { transform:translateY(100%); opacity:0; } to { transform:translateY(0); opacity:1; } }
        @keyframes checkmark { 0%{stroke-dashoffset:50} 100%{stroke-dashoffset:0} }

        .fade-up { animation: fadeUp 0.4s ease both; }
        .scale-in { animation: scaleIn 0.3s ease both; }
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }

        /* Progress bar */
        .progress-track { height:3px; background:var(--border); border-radius:99px; overflow:hidden; }
        .progress-fill { height:100%; background:linear-gradient(90deg, var(--rose), var(--plum)); border-radius:99px; transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1); }

        /* Inputs */
        .input {
            width:100%; padding:12px 16px; border:1.5px solid var(--border);
            border-radius:12px; font-size:15px; font-family:'DM Sans',sans-serif;
            background:white; color:var(--ink); transition:border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance:none;
        }
        .input:focus { outline:none; border-color:var(--plum); box-shadow:0 0 0 3px rgba(109,40,217,0.08); }
        .input::placeholder { color:#c0bcd0; }
        .input-error { border-color:var(--rose) !important; }

        /* Botões */
        .btn-primary {
            width:100%; padding:15px; border-radius:14px; font-weight:700; font-size:15px;
            background:linear-gradient(135deg, var(--rose) 0%, var(--plum) 100%);
            color:white; border:none; cursor:pointer; transition:all 0.2s;
            display:flex; align-items:center; justify-content:center; gap:8px;
            font-family:'DM Sans',sans-serif;
        }
        .btn-primary:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 20px rgba(225,29,72,0.3); }
        .btn-primary:active:not(:disabled) { transform:translateY(0); }
        .btn-primary:disabled { opacity:0.6; cursor:not-allowed; }
        .btn-secondary {
            padding:12px 20px; border-radius:12px; font-weight:600; font-size:13px;
            background:white; color:var(--ink-mid); border:1.5px solid var(--border);
            cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif;
        }
        .btn-secondary:hover { border-color:var(--plum); color:var(--plum); background:var(--plum-light); }
        .btn-ghost { background:none; border:none; cursor:pointer; color:var(--ink-mid); font-family:'DM Sans',sans-serif; }

        /* Loader */
        .spinner { width:20px; height:20px; border:2.5px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.8s linear infinite; }
        .spinner-dark { border-color:rgba(109,40,217,0.2); border-top-color:var(--plum); }

        /* Toast */
        #toast-container { position:fixed; top:16px; right:16px; z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
        .toast { 
            padding:12px 16px; border-radius:12px; font-size:13px; font-weight:600;
            color:white; min-width:200px; max-width:300px; pointer-events:all;
            animation:slideUp 0.3s ease both;
            display:flex; align-items:center; gap:8px;
        }
        .toast-success { background:#059669; }
        .toast-error { background:var(--rose); }
        .toast-info { background:var(--plum); }

        /* Cards */
        .card {
            background:white; border:1.5px solid var(--border); border-radius:16px;
            transition:all 0.2s;
        }
        .card:hover { border-color:var(--rose-mid); box-shadow:0 4px 16px rgba(225,29,72,0.08); }
        
        /* Slot de horário */
        .slot { padding:10px 8px; border-radius:10px; font-weight:700; font-size:12px; border:1.5px solid var(--border); cursor:pointer; transition:all 0.15s; text-align:center; background:white; color:var(--ink); }
        .slot:hover:not(.slot-busy) { border-color:var(--rose); color:var(--rose); }
        .slot-selected { background:var(--rose) !important; color:white !important; border-color:var(--rose) !important; transform:scale(1.05); box-shadow:0 4px 12px rgba(225,29,72,0.3); }
        .slot-busy { background:#f9f9f9; color:#d1d5db; cursor:not-allowed; border-color:#f3f4f6; }

        /* Tag */
        .tag { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:99px; font-size:11px; font-weight:700; }
        .tag-rose { background:var(--rose-light); color:var(--rose); }
        .tag-plum { background:var(--plum-light); color:var(--plum); }
        .tag-green { background:#f0fdf4; color:#059669; }

        /* Modal overlay */
        .modal-overlay { position:fixed; inset:0; background:rgba(15,10,30,0.7); z-index:200; display:flex; align-items:center; justify-content:center; padding:16px; backdrop-filter:blur(4px); }
        .modal-box { background:white; border-radius:20px; width:100%; max-width:400px; overflow:hidden; animation:scaleIn 0.25s ease both; }

        /* Toggle */
        .toggle-wrap { display:flex; align-items:center; gap:10px; }
        .toggle-input { display:none; }
        .toggle-track { width:44px; height:24px; background:#e5e7eb; border-radius:99px; cursor:pointer; transition:background 0.2s; position:relative; flex-shrink:0; }
        .toggle-input:checked + .toggle-track { background:var(--rose); }
        .toggle-thumb { position:absolute; top:3px; left:3px; width:18px; height:18px; background:white; border-radius:50%; transition:transform 0.2s; box-shadow:0 1px 4px rgba(0,0,0,0.2); }
        .toggle-input:checked + .toggle-track .toggle-thumb { transform:translateX(20px); }

        /* Scrollbar fino */
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }

        /* Depoimento */
        .depo-enter { animation:fadeUp 0.5s ease both; }

        /* Service card expanded */
        .service-options { overflow:hidden; transition:max-height 0.3s ease; }

        /* Checkmark animado */
        .check-svg { stroke-dasharray:50; stroke-dashoffset:50; animation:checkmark 0.6s ease 0.3s forwards; }

        input[type="date"] { min-height:48px; }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div id="root">
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:12px;">
            <div class="spinner spinner-dark" style="width:32px;height:32px;border-width:3px;"></div>
            <p style="color:var(--ink-mid);font-size:14px;font-family:DM Sans,sans-serif;">Carregando...</p>
        </div>
    </div>

    <script type="text/babel" data-presets="env,react" data-plugins="transform-async-to-generator,proposal-async-generator-functions">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // =============================================
    // CONFIGURAÇÕES — edite apenas aqui
    // =============================================
    const CONFIG = {
        nomeProfissional: "Le",
        telefoneProfissional: "5511989224362",
        emailProfissional: "lscilios.contato@gmail.com",
        // ATENÇÃO: A senha é verificada via hash, não fica exposta como texto puro.
        // Para trocar: abra o console do navegador e rode btoa("sua_senha") e cole o resultado aqui.
        senhaAdminHash: btoa("1234"),  // senha atual: 1234
        scriptGoogleUrl: "https://script.google.com/macros/s/AKfycbwZ4F0MuUlrFDufyaECtkfsevLZ_EtZRWVhOR3gRrJ089XP_3cSgN5tt51C9fUcEHlWZA/exec",
        // A chave Gemini NUNCA deve ficar aqui. Use um proxy ou Cloud Function.
        // Se quiser usar IA, coloque a URL do seu proxy:
        geminiProxyUrl: "", // Ex: "https://meu-proxy.vercel.app/api/gemini"

        sobrancelha: { id: 999, nome: "Design de Sobrancelhas", preco: 35, duracao: 0.5 },

        servicos: [
            { id: 1,  nome: "Volume Pamela",   desc: "Fio a Fio Black. Fios ocos com pontinha dupla — leve, com efeito rímel e mais volume.",          imagem: "img/pamela.jpg",   duracao: 2,   precos: { aplicacao: 115, manutencao: 95,  remocao: 30 } },
            { id: 2,  nome: "Volume Paty",     desc: "Brasileiro. Fios em Y que criam volume de acordo com seus cílios naturais. Efeito entrelaçado.",  imagem: "img/paty.jpg",     duracao: 2.5, precos: { aplicacao: 135, manutencao: 100, remocao: 30 } },
            { id: 3,  nome: "Volume Marcela",  desc: "Brasileiro versão marrom. Mesma técnica do Paty, com a delicadeza e naturalidade da cor marrom.", imagem: "img/marcela.jpg",  duracao: 2.5, precos: { aplicacao: 135, manutencao: 100, remocao: 30 } },
            { id: 4,  nome: "Volume Jaque",    desc: "Fox Eyes. Olhar alongado, sensual e marcante no estilo olhos de raposa.",                         imagem: "img/jaque.jpg",    duracao: 2.5, precos: { aplicacao: 135, manutencao: 100, remocao: 30 } },
            { id: 5,  nome: "Volume Emily",    desc: "Efeito delineado sutil. Curvatura M com efeito lifting — base reta que curva só na metade.",      imagem: "img/emily.jpg",    duracao: 2.5, precos: { aplicacao: 140, manutencao: 105, remocao: 30 } },
            { id: 6,  nome: "Volume Duda",     desc: "Volume 3D. Fios sintéticos ultrafinos com fio marcante no meio. Efeito dramático e marcante.",    imagem: "img/duda.jpg",     duracao: 3,   precos: { aplicacao: 140, manutencao: 105, remocao: 30 } },
            { id: 7,  nome: "Volume Carol",    desc: "Inglês 5D preto. Leque com até 5 fios por cílio natural. Volumoso e dramático.",                  imagem: "img/carol.jpg",    duracao: 3,   precos: { aplicacao: 155, manutencao: 105, remocao: 30 } },
            { id: 8,  nome: "Volume Carine",   desc: "Inglês 5D marrom. Igual ao Carol, mas com fios marrom para um efeito volumoso e delicado.",       imagem: "img/carine.jpg",   duracao: 3,   precos: { aplicacao: 155, manutencao: 105, remocao: 30 } },
            { id: 9,  nome: "Volume Nath",     desc: "Efeito molhado. Agrupamentos de fios que criam a sensação de fios levemente úmidos. Elegante.",   imagem: "img/nath.jpg",     duracao: 2.5, precos: { aplicacao: 130, manutencao: 100, remocao: 30 } },
            { id: 10, nome: "Volume Grazi",    desc: "Naturalmente marcante. Semelhante ao fio a fio com toque extra de volume. Suave e equilibrado.",  imagem: "img/grazi.jpg",    duracao: 2,   precos: { aplicacao: 135, manutencao: 105, remocao: 30 } },
            { id: 11, nome: "Volume Bia",      desc: "Sirena. Aplicado do meio ao final dos olhos. Fios 5D curvatura M — puxadinho e elegante.",        imagem: "img/bia.jpg",      duracao: 2.5, precos: { aplicacao: 130, manutencao: 100, remocao: 30 } },
            { id: 12, nome: "Volume Fernanda", desc: "Delicado e elegante. 3 fios fechadinhos na curvatura C. Um pouco mais cheio que o Grazi.",        imagem: "img/fernanda.jpg", duracao: 2,   precos: { aplicacao: 135, manutencao: 105, remocao: 30 } }
        ],

        depoimentos: [
            { texto: "Amo sua flexibilidade, paciência e atendimento. Você me dá a liberdade de escolher o estilo e a durabilidade é ótima!" },
            { texto: "Seu trabalho é ótimo! Espaço aconchegante, higiene impecável e cuidado para não arder os olhos." },
            { texto: "Seu trabalho é sinceramente o melhor que já fiz. Não fico mais sem cílios e sem você!" }
        ]
    };

    // =============================================
    // UTILITÁRIOS
    // =============================================

    /** Toast system — substitui todos os alert() */
    const toast = {
        show(msg, type = 'info', duration = 3500) {
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.innerHTML = `<span>${type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'}</span><span>${msg}</span>`;
            document.getElementById('toast-container').appendChild(el);
            setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity 0.3s'; setTimeout(()=>el.remove(),300); }, duration);
        },
        success: (msg) => toast.show(msg, 'success'),
        error:   (msg) => toast.show(msg, 'error'),
        info:    (msg) => toast.show(msg, 'info'),
    };

    const formatarTelefone = (v) => {
        if (!v) return "";
        const n = v.replace(/\D/g, "").substring(0, 11);
        if (n.length <= 6)  return n.replace(/^(\d{0,2})(\d{0,4})/, "($1) $2").replace(/\(\) /, '');
        if (n.length <= 10) return n.replace(/^(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3");
        return n.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
    };

    const validarEmail = (e) => !e || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);

    const gerarLinkWhatsApp = (num, msg) => {
        const n = String(num || "").replace(/\D/g, "");
        if (n.length < 10) return null;
        const final = n.startsWith('55') ? n : '55' + n;
        return `https://wa.me/${final}?text=${encodeURIComponent(msg)}`;
    };

    const hoje = () => new Date().toISOString().split('T')[0];

    /** Gera slots de horário para a data */
    const gerarHorarios = (dateStr) => {
        if (!dateStr) return [];
        const dia = new Date(dateStr + 'T12:00:00').getDay();
        if (dia === 0 || dia === 1) return [];
        const slots = [];
        const inicio = (dia === 2 || dia === 4) ? 9 : 10;
        const fim    = dia === 6 ? 14 : 18;
        for (let h = inicio; h <= fim; h++) slots.push(`${String(h).padStart(2,'0')}:00`);
        return slots;
    };

    /** Busca horários ocupados via Google Apps Script */
    const buscarHorariosOcupados = async (date) => {
        try {
            const url = `${CONFIG.scriptGoogleUrl}?action=get_agenda&date=${date}`;
            const res = await fetch(url, { method: 'GET', redirect: 'follow' });
            const text = await res.text();
            const eventos = JSON.parse(text);
            return Array.isArray(eventos) ? eventos : [];
        } catch {
            return [];
        }
    };

    /** Calcula slots realmente ocupados (considerando duração real do serviço) */
    const calcularOcupados = (slots, eventos, duracaoHoras) => {
        const dur = Math.ceil(duracaoHoras || 1);
        const ocupados = new Set();

        eventos.forEach(ev => {
            if (ev.isAllDay) {
                slots.forEach(s => ocupados.add(s));
                return;
            }
            slots.forEach(slot => {
                const [sh] = slot.split(':').map(Number);
                const slotStart = sh * 60;
                const slotEnd   = slotStart + 60;
                const evStart   = ev.startHour * 60 + ev.startMin;
                const evEnd     = ev.endHour   * 60 + ev.endMin;
                if (slotStart < evEnd && slotEnd > evStart) ocupados.add(slot);
            });
        });

        // Bloqueia slots onde o serviço não caberia inteiro
        const resultado = new Set(ocupados);
        slots.forEach(slot => {
            const [sh] = slot.split(':').map(Number);
            for (let i = 0; i < dur; i++) {
                const h = String(sh + i).padStart(2, '0') + ':00';
                if (ocupados.has(h) || !slots.includes(h)) { resultado.add(slot); break; }
            }
        });

        return resultado;
    };

    /** Salva agendamento na planilha */
    const salvarAgendamentoPlanilha = async (dados) => {
        if (!CONFIG.scriptGoogleUrl) return true;
        try {
            let nomeServico = dados.servico || (dados.servicoObj ? dados.servicoObj.nome : "Serviço");
            if (dados.incluiSobrancelha && dados.servicoObj?.id !== 999) {
                nomeServico += " + Design Sobrancelhas";
            }
            const payload = {
                nome: dados.nome || "",
                whatsapp: dados.whatsapp || "",
                email: dados.email || "",
                nascimento: dados.nascimento || "",
                servico: nomeServico,
                duracaoTotal: dados.duracaoTotal || 2,
                tipoServico: dados.tipoServico || "Aplicação",
                precoFinal: dados.precoFinal || 0,
                data: dados.data || "",
                hora: dados.hora || "",
                tipoAtendimento: dados.tipoAtendimento || "studio",
                endereco: dados.endereco || ""
            };
            // Usamos text/plain para contornar preflight CORS — Google Apps Script exige isso
            const res = await fetch(CONFIG.scriptGoogleUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            return true;
        } catch (e) {
            console.error("Erro ao salvar:", e);
            return false;
        }
    };

    /** Chama IA via proxy (nunca exponha a chave no frontend) */
    const chamarIA = async (prompt) => {
        if (!CONFIG.geminiProxyUrl) return "IA não configurada.";
        try {
            const res = await fetch(CONFIG.geminiProxyUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            });
            const data = await res.json();
            return data.text || "Sem resposta.";
        } catch {
            return "Erro de conexão com a IA.";
        }
    };

    // =============================================
    // HOOK: agenda + ocupados
    // =============================================
    function useAgenda(data, duracaoHoras) {
        const [slots, setSlots]       = useState([]);
        const [ocupados, setOcupados] = useState(new Set());
        const [loading, setLoading]   = useState(false);

        useEffect(() => {
            if (!data) { setSlots([]); setOcupados(new Set()); return; }
            const s = gerarHorarios(data);
            setSlots(s);
            if (s.length === 0) { setOcupados(new Set()); return; }
            setLoading(true);
            buscarHorariosOcupados(data).then(eventos => {
                setOcupados(calcularOcupados(s, eventos, duracaoHoras));
                setLoading(false);
            });
        }, [data, duracaoHoras]);

        return { slots, ocupados, loadingAgenda: loading };
    }

    // =============================================
    // COMPONENTE: Seletor de Horário (reutilizável)
    // =============================================
    function SeletorHorario({ data, duracaoHoras, horaSelecionada, onSelect }) {
        const { slots, ocupados, loadingAgenda } = useAgenda(data, duracaoHoras);

        if (!data) return null;
        if (loadingAgenda) return (
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'12px 0',color:'var(--plum)',fontSize:13,fontWeight:600}}>
                <div className="spinner spinner-dark" style={{width:16,height:16}}/> Verificando agenda...
            </div>
        );
        if (slots.length === 0) return (
            <div style={{padding:'12px',background:'#fff1f4',borderRadius:10,color:'var(--rose)',fontSize:13,fontWeight:600}}>
                Studio fechado neste dia.
            </div>
        );

        return (
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
                {slots.map(h => {
                    const busy = ocupados.has(h);
                    return (
                        <button key={h} disabled={busy}
                            onClick={() => !busy && onSelect(h)}
                            className={`slot ${busy ? 'slot-busy' : horaSelecionada === h ? 'slot-selected' : ''}`}>
                            {h}
                        </button>
                    );
                })}
            </div>
        );
    }

    // =============================================
    // COMPONENTE: Modal de Confirmação de Horário
    // =============================================
    function ModalConfirmacaoHorario({ hora, onConfirm, onCancel }) {
        if (!hora) return null;
        return (
            <div className="modal-overlay" onClick={onCancel}>
                <div className="modal-box" style={{maxWidth:320,padding:'28px 24px',textAlign:'center'}} onClick={e=>e.stopPropagation()}>
                    <div style={{fontSize:40,marginBottom:12}}>⏰</div>
                    <h3 style={{margin:'0 0 8px',fontSize:20}}>Confirmar horário?</h3>
                    <p style={{color:'var(--ink-mid)',fontSize:14,marginBottom:24}}>Você escolheu as <strong style={{color:'var(--rose)'}}>{hora}</strong>. Confirma?</p>
                    <div style={{display:'flex',gap:10}}>
                        <button className="btn-secondary" style={{flex:1}} onClick={onCancel}>Voltar</button>
                        <button className="btn-primary" style={{flex:1}} onClick={onConfirm}>Confirmar</button>
                    </div>
                </div>
            </div>
        );
    }

    // =============================================
    // COMPONENTE: Modal de Detalhes do Serviço
    // =============================================
    function ModalDetalhesServico({ servico, onClose }) {
        if (!servico) return null;
        return (
            <div className="modal-overlay" onClick={onClose}>
                <div className="modal-box" onClick={e=>e.stopPropagation()}>
                    <div style={{height:220,background:'#f3f0ff',position:'relative'}}>
                        <img src={servico.imagem} alt={servico.nome} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={e=>{e.target.style.display='none'}}/>
                        <button onClick={onClose} style={{position:'absolute',top:12,right:12,background:'rgba(0,0,0,0.5)',color:'white',border:'none',borderRadius:'50%',width:32,height:32,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>✕</button>
                    </div>
                    <div style={{padding:'20px 24px 24px'}}>
                        <h3 style={{margin:'0 0 8px',fontSize:22}}>{servico.nome}</h3>
                        <p style={{color:'var(--ink-mid)',fontSize:14,lineHeight:1.7}}>{servico.desc}</p>
                        <div style={{marginTop:16,display:'flex',gap:8,flexWrap:'wrap'}}>
                            <span className="tag tag-rose">⏱ {servico.duracao}h</span>
                            <span className="tag tag-plum">A partir de R$ {Math.min(servico.precos.aplicacao, servico.precos.manutencao)}</span>
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    // =============================================
    // TELA DO CLIENTE
    // =============================================
    function TelaCliente({ aoFinalizar }) {
        const [step, setStep]   = useState(0);
        const [servico, setServico]   = useState(null);
        const [tipo, setTipo]         = useState('');
        const [preco, setPreco]       = useState(0);
        const [incluiSobrancelha, setIncluiSobrancelha] = useState(false);
        const [duracao, setDuracao]   = useState(2);
        const [expandido, setExpandido] = useState(null);
        const [modalServico, setModalServico] = useState(null);
        const [horaPendente, setHoraPendente] = useState('');
        const [confirmandoHora, setConfirmandoHora] = useState(false);

        const [form, setForm] = useState({
            nome:'', whatsapp:'', email:'', nascimento:'', data:'',
            hora:'', tipoAtendimento:'studio', endereco:'', complemento:''
        });
        const [sabeNascimento, setSabeNascimento] = useState(false);
        const [loading, setLoading] = useState(false);
        const [errors, setErrors]   = useState({});
        const [depoIndex, setDepoIndex] = useState(0);

        useEffect(()=>{
            const t = setInterval(()=>setDepoIndex(i=>(i+1)%CONFIG.depoimentos.length), 5000);
            return ()=>clearInterval(t);
        },[]);

        const steps = ['Serviço','Tipo','Dados'];
        const stepAtual = step >= 2 ? 2 : step;

        const selecionarCategoria = (cat) => {
            if (cat === 'cilios')      { setIncluiSobrancelha(false); setStep(1); }
            else if (cat === 'sobr')   {
                setServico({...CONFIG.sobrancelha, precos:{aplicacao:CONFIG.sobrancelha.preco,manutencao:CONFIG.sobrancelha.preco}});
                setTipo('aplicacao'); setPreco(CONFIG.sobrancelha.preco); setDuracao(CONFIG.sobrancelha.duracao);
                setIncluiSobrancelha(false); setStep(2);
            }
            else { setIncluiSobrancelha(true); setStep(1); }
        };

        const selecionarServico = (s, t) => {
            const extra = (incluiSobrancelha && s.id !== 999) ? CONFIG.sobrancelha.preco : 0;
            const p = s.precos[t] + extra;
            let d = s.duracao;
            if (t === 'remocao') d = 1;
            else if (incluiSobrancelha) d = Math.max(d, 2) + CONFIG.sobrancelha.duracao;
            setServico(s); setTipo(t); setPreco(p); setDuracao(d);
            setExpandido(null); setModalServico(null); setStep(2);
        };

        const setField = (k, v) => { setForm(f=>({...f,[k]:v})); setErrors(e=>({...e,[k]:null})); };

        const validar = () => {
            const e = {};
            if (!form.nome.trim())    e.nome = 'Obrigatório';
            if (form.whatsapp.replace(/\D/g,'').length < 10) e.whatsapp = 'Número inválido';
            if (form.email && !validarEmail(form.email)) e.email = 'E-mail inválido';
            if (!form.data)  e.data = 'Obrigatório';
            if (!form.hora)  e.hora = 'Selecione um horário';
            if (form.tipoAtendimento === 'domicilio' && form.endereco.trim().length < 10) e.endereco = 'Endereço muito curto';
            setErrors(e);
            return Object.keys(e).length === 0;
        };

        const salvar = async () => {
            if (!validar()) { toast.error('Corrija os campos em vermelho.'); return; }
            setLoading(true);
            const payload = { ...form, servicoObj: servico, servico: servico?.nome, tipoServico: tipo, precoFinal: preco, duracaoTotal: duracao, incluiSobrancelha, nascimento: sabeNascimento ? form.nascimento : '' };
            const ok = await salvarAgendamentoPlanilha(payload);
            setLoading(false);
            if (ok) aoFinalizar(payload);
            else toast.error('Erro ao salvar. Tente novamente.');
        };

        return (
            <div style={{background:'white',borderRadius:20,border:'1.5px solid var(--border)',overflow:'hidden',boxShadow:'0 4px 32px rgba(109,40,217,0.08)'}}>
                {/* Progress */}
                {step > 0 && (
                    <div style={{padding:'16px 20px 0'}}>
                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                            {steps.map((s,i) => (
                                <span key={i} style={{fontSize:11,fontWeight:700,color:i===stepAtual?'var(--rose)':i<stepAtual?'var(--plum)':'#c0bcd0',textTransform:'uppercase',letterSpacing:'0.5px'}}>{s}</span>
                            ))}
                        </div>
                        <div className="progress-track">
                            <div className="progress-fill" style={{width: stepAtual === 1 ? '50%' : stepAtual === 2 ? '100%' : '0%'}}/>
                        </div>
                    </div>
                )}

                <div style={{padding:20}}>
                    {/* STEP 0 - Categoria */}
                    {step === 0 && (
                        <div className="fade-up">
                            {/* Depoimento rotativo */}
                            <div style={{background:'linear-gradient(135deg,#fff1f4,#f5f3ff)',borderRadius:14,padding:'16px 18px',marginBottom:20,borderLeft:'3px solid var(--rose)'}}>
                                <div className="depo-enter" key={depoIndex}>
                                    <p style={{fontSize:13,color:'var(--ink)',fontStyle:'italic',margin:'0 0 8px',lineHeight:1.7}}>"{CONFIG.depoimentos[depoIndex].texto}"</p>
                                    <span style={{fontSize:11,color:'var(--rose)',fontWeight:700}}>{'★★★★★'}</span>
                                </div>
                            </div>

                            <h2 style={{margin:'0 0 4px',fontSize:22}}>Olá, maravilhosa! ✨</h2>
                            <p style={{color:'var(--ink-mid)',fontSize:14,marginBottom:20}}>O que vamos realçar hoje?</p>

                            {[
                                { key:'cilios',  emoji:'👁️', title:'Cílios',          sub:'Extensão, Manutenção ou Remoção' },
                                { key:'sobr',    emoji:'✏️', title:'Sobrancelhas',     sub:'Design Simples · 30 min · R$ 35' },
                                { key:'combo',   emoji:'💖', title:'Combo Completo',   sub:'Cílios + Sobrancelha', hot:true },
                            ].map(({ key, emoji, title, sub, hot }) => (
                                <button key={key} onClick={() => selecionarCategoria(key)}
                                    style={{
                                        width:'100%', marginBottom:10, padding:'16px',
                                        background: hot ? 'linear-gradient(135deg,var(--rose),var(--plum))' : 'white',
                                        border: hot ? 'none' : '1.5px solid var(--border)',
                                        borderRadius:14, cursor:'pointer', textAlign:'left',
                                        display:'flex', alignItems:'center', gap:14, position:'relative',
                                        transition:'all 0.2s', color: hot ? 'white' : 'var(--ink)',
                                        boxShadow: hot ? '0 6px 20px rgba(225,29,72,0.25)' : 'none'
                                    }}
                                    onMouseEnter={e=>{if(!hot){e.currentTarget.style.borderColor='var(--rose-mid)';e.currentTarget.style.boxShadow='0 4px 12px rgba(225,29,72,0.08)';}}}
                                    onMouseLeave={e=>{if(!hot){e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.boxShadow='none';}}}>
                                    {hot && <span style={{position:'absolute',top:0,right:0,background:'#facc15',color:'#1e1b2e',fontSize:9,fontWeight:800,padding:'3px 8px',borderRadius:'0 14px 0 8px'}}>MAIS PEDIDO 🔥</span>}
                                    <span style={{fontSize:26}}>{emoji}</span>
                                    <div>
                                        <p style={{margin:0,fontWeight:700,fontSize:15}}>{title}</p>
                                        <p style={{margin:0,fontSize:12,opacity:0.75,marginTop:2}}>{sub}</p>
                                    </div>
                                    <span style={{marginLeft:'auto',fontSize:18,opacity:0.5}}>›</span>
                                </button>
                            ))}
                        </div>
                    )}

                    {/* STEP 1 - Serviço */}
                    {step === 1 && (
                        <div className="fade-up">
                            <button className="btn-ghost" style={{marginBottom:12,fontSize:13}} onClick={()=>setStep(0)}>← Voltar</button>
                            <h2 style={{margin:'0 0 4px',fontSize:22}}>Escolha o Modelo</h2>
                            <p style={{color:'var(--ink-mid)',fontSize:13,marginBottom:16}}>Clique no nome para ver as opções de preço.</p>

                            {/* Toggle sobrancelha */}
                            <div style={{background:'linear-gradient(135deg,#fff1f4,#f5f3ff)',border:'1.5px solid var(--border)',borderRadius:14,padding:'12px 16px',marginBottom:16,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                                <div>
                                    <p style={{margin:0,fontWeight:700,fontSize:14}}>Adicionar Sobrancelha?</p>
                                    <p style={{margin:0,fontSize:12,color:'var(--ink-mid)'}}>Design Simples · +R$ 35</p>
                                </div>
                                <div className="toggle-wrap">
                                    <input type="checkbox" id="togSobr" className="toggle-input" checked={incluiSobrancelha} onChange={e=>setIncluiSobrancelha(e.target.checked)}/>
                                    <label htmlFor="togSobr" className="toggle-track"><div className="toggle-thumb"/></label>
                                </div>
                            </div>

                            <div style={{display:'flex',flexDirection:'column',gap:10}}>
                                {CONFIG.servicos.map(s => (
                                    <div key={s.id} className="card">
                                        <div style={{display:'flex',gap:12,alignItems:'center',padding:'12px 14px',cursor:'pointer'}}
                                            onClick={()=>setExpandido(expandido===s.id?null:s.id)}>
                                            <div style={{width:52,height:52,borderRadius:10,overflow:'hidden',flexShrink:0,background:'#f3f0ff'}}>
                                                <img src={s.imagem} alt={s.nome} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={e=>{e.target.style.display='none'}}/>
                                            </div>
                                            <div style={{flex:1,minWidth:0}}>
                                                <p style={{margin:0,fontWeight:700,fontSize:14}}>{s.nome}</p>
                                                <p style={{margin:0,fontSize:12,color:'var(--ink-mid)',marginTop:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{s.desc}</p>
                                            </div>
                                            <button onClick={e=>{e.stopPropagation();setModalServico(s);}} style={{color:'var(--rose-mid)',background:'none',border:'none',cursor:'pointer',fontSize:16,padding:'0 4px'}}>ℹ</button>
                                            <span style={{color:'var(--ink-mid)',fontSize:12,transition:'transform 0.2s',display:'block',transform:expandido===s.id?'rotate(90deg)':''}}>›</span>
                                        </div>
                                        {expandido === s.id && (
                                            <div className="fade-up" style={{borderTop:'1px solid var(--border)',padding:'10px 14px',display:'flex',flexDirection:'column',gap:6}}>
                                                {[
                                                    { key:'aplicacao',  label:'✨ Aplicação Nova', color:'var(--rose)' },
                                                    { key:'manutencao', label:'🔧 Manutenção',      color:'var(--plum)' },
                                                    { key:'remocao',    label:'🧼 Remoção',          color:'#6b7280' },
                                                ].map(({ key, label, color }) => (
                                                    <button key={key} onClick={()=>selecionarServico(s,key)}
                                                        style={{padding:'10px 12px',border:'1.5px solid var(--border)',borderRadius:10,background:'white',
                                                            display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',transition:'all 0.15s'}}
                                                        onMouseEnter={e=>{e.currentTarget.style.borderColor=color;e.currentTarget.style.background='#fafafa';}}
                                                        onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='white';}}>
                                                        <span style={{fontSize:13,fontWeight:500}}>{label}</span>
                                                        <span style={{fontWeight:800,color,fontSize:14}}>R$ {s.precos[key] + (incluiSobrancelha ? CONFIG.sobrancelha.preco : 0)}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* STEP 2 - Dados */}
                    {step === 2 && (
                        <div className="fade-up" style={{display:'flex',flexDirection:'column',gap:14}}>
                            <button className="btn-ghost" style={{fontSize:13}} onClick={()=>servico?.id===999?setStep(0):setStep(1)}>← Voltar</button>

                            {/* Resumo do serviço */}
                            <div style={{background:'linear-gradient(135deg,var(--rose-light),var(--plum-light))',borderRadius:14,padding:'14px 16px',border:'1.5px solid var(--border)'}}>
                                <p style={{margin:0,fontWeight:700,color:'var(--rose)',fontSize:15}}>{servico?.nome}{incluiSobrancelha && servico?.id!==999?' + Sobrancelha':''}</p>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}}>
                                    <span style={{fontSize:13,color:'var(--ink-mid)',textTransform:'capitalize'}}>{tipo}</span>
                                    <span style={{fontWeight:800,fontSize:18,color:'var(--ink)'}}>R$ {preco}</span>
                                </div>
                            </div>

                            {/* Avisos */}
                            <div style={{background:'#f9fafb',borderRadius:12,padding:'12px 14px',border:'1px solid #e5e7eb'}}>
                                <p style={{margin:'0 0 8px',fontWeight:700,fontSize:12,color:'var(--ink-mid)',textTransform:'uppercase',letterSpacing:'0.5px'}}>Antes de vir:</p>
                                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,fontSize:12,color:'var(--ink)'}}>
                                    {[['⏱','Duração: '+duracao+'h'],['💄','Sem rímel'],['👓','Remover lentes'],['⏰','Tolerância 15min']].map(([e,t])=>(
                                        <div key={t} style={{display:'flex',alignItems:'center',gap:6}}><span>{e}</span><span>{t}</span></div>
                                    ))}
                                </div>
                                <p style={{margin:'10px 0 0',fontSize:11,color:'#f43f5e',lineHeight:1.5}}>
                                    ⚠️ Contraindicações: alergias, conjuntivite ativa ou pele extremamente sensível.
                                </p>
                            </div>

                            {/* Campos do formulário */}
                            <div>
                                <label style={{fontSize:12,fontWeight:700,color:'var(--ink-mid)',textTransform:'uppercase',letterSpacing:'0.5px',display:'block',marginBottom:6}}>Nome *</label>
                                <input className={`input ${errors.nome?'input-error':''}`} placeholder="Seu nome completo" value={form.nome} onChange={e=>setField('nome',e.target.value)}/>
                                {errors.nome && <p style={{color:'var(--rose)',fontSize:11,marginTop:4}}>{errors.nome}</p>}
                            </div>
                            <div>
                                <label style={{fontSize:12,fontWeight:700,color:'var(--ink-mid)',textTransform:'uppercase',letterSpacing:'0.5px',display:'block',marginBottom:6}}>WhatsApp *</label>
                                <input className={`input ${errors.whatsapp?'input-error':''}`} type="tel" placeholder="(11) 99999-9999" value={form.whatsapp} onChange={e=>setField('whatsapp',formatarTelefone(e.target.value))} maxLength={15}/>
                                {errors.whatsapp && <p style={{color:'var(--rose)',fontSize:11,marginTop:4}}>{errors.whatsapp}</p>}
                            </div>
                            <div>
                                <label style={{fontSize:12,fontWeight:700,color:'var(--ink-mid)',textTransform:'uppercase',letterSpacing:'0.5px',display:'block',marginBottom:6}}>E-mail</label>
                                <input className={`input ${errors.email?'input-error':''}`} type="email" placeholder="seu@email.com" value={form.email} onChange={e=>setField('email',e.target.value)}/>
                                {errors.email && <p style={{color:'var(--rose)',fontSize:11,marginTop:4}}>{errors.email}</p>}
                            </div>

                            {/* Aniversário opcional */}
                            <div style={{background:'#f9fafb',borderRadius:12,padding:'12px 14px',border:'1px solid #e5e7eb'}}>
                                <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',userSelect:'none'}}>
                                    <input type="checkbox" style={{width:16,height:16,accentColor:'var(--rose)',cursor:'pointer'}} checked={sabeNascimento} onChange={e=>setSabeNascimento(e.target.checked)}/>
                                    <span style={{fontSize:13,fontWeight:600,color:'var(--ink)'}}>Informar data de aniversário 🎂</span>
                                </label>
                                {sabeNascimento && (
                                    <div className="fade-up" style={{marginTop:10}}>
                                        <input type="date" className="input" value={form.nascimento} onChange={e=>setField('nascimento',e.target.value)}/>
                                    </div>
                                )}
                            </div>

                            {/* Tipo de atendimento */}
                            <div>
                                <label style={{fontSize:12,fontWeight:700,color:'var(--ink-mid)',textTransform:'uppercase',letterSpacing:'0.5px',display:'block',marginBottom:8}}>Onde será o atendimento?</label>
                                <div style={{display:'flex',gap:8}}>
                                    {['studio','domicilio'].map(t=>(
                                        <button key={t} onClick={()=>setField('tipoAtendimento',t)}
                                            style={{flex:1,padding:'10px',borderRadius:10,border:'1.5px solid',cursor:'pointer',fontWeight:700,fontSize:13,transition:'all 0.15s',
                                                borderColor:form.tipoAtendimento===t?'var(--rose)':'var(--border)',
                                                background:form.tipoAtendimento===t?'var(--rose-light)':'white',
                                                color:form.tipoAtendimento===t?'var(--rose)':'var(--ink-mid)'}}>
                                            {t==='studio'?'🏢 No Studio':'🏠 A Domicílio'}
                                        </button>
                                    ))}
                                </div>
                                {form.tipoAtendimento === 'domicilio' && (
                                    <div className="fade-up" style={{marginTop:10,padding:'10px',background:'#fffbeb',borderRadius:10,border:'1px solid #fde68a'}}>
                                        <p style={{margin:'0 0 10px',fontSize:12,color:'#92400e'}}>⚠️ Taxa de deslocamento será combinada previamente.</p>
                                        <input className={`input ${errors.endereco?'input-error':''}`} placeholder="Rua, número, bairro, cidade *" value={form.endereco} onChange={e=>setField('endereco',e.target.value)} style={{marginBottom:8}}/>
                                        {errors.endereco && <p style={{color:'var(--rose)',fontSize:11,marginBottom:6}}>{errors.endereco}</p>}
                                        <input className="input" placeholder="Complemento (apto, bloco...)" value={form.complemento} onChange={e=>setField('complemento',e.target.value)}/>
                                    </div>
                                )}
                            </div>

                            {/* Data */}
                            <div>
                                <label style={{fontSize:12,fontWeight:700,color:'var(--ink-mid)',textTransform:'uppercase',letterSpacing:'0.5px',display:'block',marginBottom:6}}>Data *</label>
                                <input type="date" className={`input ${errors.data?'input-error':''}`} min={hoje()} value={form.data} onChange={e=>{setField('data',e.target.value);setField('hora','');}}/>
                                {errors.data && <p style={{color:'var(--rose)',fontSize:11,marginTop:4}}>{errors.data}</p>}
                            </div>

                            {/* Horários */}
                            {form.data && (
                                <div className="fade-up">
                                    <label style={{fontSize:12,fontWeight:700,color:'var(--ink-mid)',textTransform:'uppercase',letterSpacing:'0.5px',display:'block',marginBottom:8}}>Horário disponível *</label>
                                    <SeletorHorario
                                        data={form.data}
                                        duracaoHoras={duracao}
                                        horaSelecionada={form.hora}
                                        onSelect={h=>{setHoraPendente(h);setConfirmandoHora(true);}}
                                    />
                                    {errors.hora && <p style={{color:'var(--rose)',fontSize:11,marginTop:6}}>{errors.hora}</p>}
                                </div>
                            )}

                            {form.hora && (
                                <div className="fade-up">
                                    <div style={{background:'var(--plum-light)',border:'1.5px solid #ddd6fe',borderRadius:12,padding:'10px 14px',marginBottom:14,display:'flex',alignItems:'center',gap:8}}>
                                        <span style={{fontSize:16}}>✅</span>
                                        <p style={{margin:0,fontSize:13,color:'var(--plum)',fontWeight:600}}>{form.data.split('-').reverse().join('/')} às {form.hora}</p>
                                    </div>
                                    <button className="btn-primary" onClick={salvar} disabled={loading}>
                                        {loading ? <><div className="spinner"/>Processando...</> : <>Agendar e Enviar WhatsApp 💬</>}
                                    </button>
                                </div>
                            )}
                        </div>
                    )}
                </div>

                {/* Modais */}
                <ModalDetalhesServico servico={modalServico} onClose={()=>setModalServico(null)}/>
                <ModalConfirmacaoHorario hora={confirmandoHora?horaPendente:null} onConfirm={()=>{setField('hora',horaPendente);setConfirmandoHora(false);}} onCancel={()=>setConfirmandoHora(false)}/>
            </div>
        );
    }

    // =============================================
    // TELA DE SUCESSO
    // =============================================
    function TelaSucesso({ dados, onReiniciar }) {
        const irWhatsapp = () => {
            const s = dados.servicoObj?.nome || dados.servico || 'Serviço';
            const msg = `Olá Le! Acabei de agendar pelo site 😊\n\n*Serviço:* ${s}\n*Data:* ${dados.data.split('-').reverse().join('/')} às ${dados.hora}\n*Nome:* ${dados.nome}`;
            const link = gerarLinkWhatsApp(CONFIG.telefoneProfissional, msg);
            if (link) window.open(link, '_blank');
        };

        return (
            <div className="slide-up" style={{background:'white',borderRadius:20,border:'1.5px solid var(--border)',overflow:'hidden',boxShadow:'0 4px 32px rgba(109,40,217,0.08)',padding:'40px 24px',textAlign:'center'}}>
                <div style={{width:72,height:72,background:'#f0fdf4',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}>
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#059669" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <polyline className="check-svg" points="20 6 9 17 4 12"/>
                    </svg>
                </div>
                <h2 style={{margin:'0 0 8px',fontSize:26}}>Agendado! 🎉</h2>
                <p style={{color:'var(--ink-mid)',fontSize:14,marginBottom:24}}>Seu horário está pré-reservado. Confirme pelo WhatsApp.</p>
                
                <div style={{background:'var(--rose-light)',border:'1.5px solid var(--rose-mid)',borderRadius:14,padding:'16px',textAlign:'left',marginBottom:24}}>
                    <p style={{margin:'0 0 4px',fontSize:11,color:'var(--ink-mid)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.5px'}}>Resumo</p>
                    <p style={{margin:0,fontWeight:700,fontSize:16,color:'var(--ink)'}}>{dados.servicoObj?.nome || dados.servico}</p>
                    <p style={{margin:'4px 0 0',fontSize:14,color:'var(--ink-mid)'}}>📅 {dados.data.split('-').reverse().join('/')} às {dados.hora}</p>
                    <p style={{margin:'2px 0 0',fontSize:14,color:'var(--ink-mid)'}}>👤 {dados.nome}</p>
                </div>

                <button className="btn-primary" style={{background:'#25D366',boxShadow:'0 6px 20px rgba(37,211,102,0.3)'}} onClick={irWhatsapp}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                    Confirmar no WhatsApp
                </button>
                <button className="btn-ghost" style={{marginTop:16,fontSize:13,display:'block',width:'100%'}} onClick={onReiniciar}>← Voltar ao início</button>
            </div>
        );
    }

    // =============================================
    // PAINEL PROFISSIONAL
    // =============================================
    function TelaProfissional({ onSair }) {
        const [aba, setAba]                = useState('agenda');
        const [dataLote, setDataLote]      = useState(hoje());
        const [clientes, setClientes]      = useState([]);
        const [bancoDB, setBancoDB]        = useState([]);
        const [despesas, setDespesas]      = useState([]);
        const [loadingSync, setLoadingSync] = useState(false);
        const [loadingDB, setLoadingDB]    = useState(false);
        const [modalNovoAg, setModalNovoAg] = useState(false);
        const [loadingNovoAg, setLoadingNovoAg] = useState(false);
        const [modalSelecionarContato, setModalSelecionarContato] = useState(false);
        const [clientePendente, setClientePendente] = useState(null);
        const [novaDespesa, setNovaDespesa] = useState({ nome:'', valor:'' });
        const [modalAnalisar, setModalAnalisar] = useState(null);
        const [incentivoIA, setIncentivoIA] = useState('');
        const [msgIA, setMsgIA]            = useState('');
        const [loadingIA, setLoadingIA]    = useState(false);
        const [modalNiver, setModalNiver]  = useState(null);
        const [descontoNiver, setDescontoNiver] = useState(0); // 0 = sem desconto
        const [msgNiver, setMsgNiver]      = useState('');

        useEffect(()=>{
            const saved = localStorage.getItem('ls_despesas_v2');
            if(saved) try { setDespesas(JSON.parse(saved)); } catch {}
            baixarClientes();
        },[]);

        const sincronizarAgenda = async () => {
            setLoadingSync(true);
            try {
                const eventos = await buscarHorariosOcupados(dataLote);
                const lista = eventos.filter(ev=>!ev.isAllDay).map(ev=>{
                    const m = ev.description?.match(/(?:Whats|Whatsapp)[a-z]*:\s*([+\d() -]+)/i);
                    const loc = (ev.location||'').toLowerCase();
                    return {
                        id: Math.random(),
                        nome: (ev.title||'Cliente').replace(/^Cílios:\s*/i,'').trim(),
                        hora: `${String(ev.startHour).padStart(2,'0')}:${String(ev.startMin).padStart(2,'0')}`,
                        tipo: (!loc || loc.length<5 || loc.includes('studio') || loc.includes('prestes')) ? 'studio' : 'domicilio',
                        whatsapp: m?m[1].trim():null,
                        location: ev.location
                    };
                }).sort((a,b)=>a.hora.localeCompare(b.hora));
                setClientes(lista);
            } catch(e) { toast.error('Erro ao sincronizar agenda.'); }
            setLoadingSync(false);
        };

        const baixarClientes = async () => {
            setLoadingDB(true);
            try {
                const res = await fetch(`${CONFIG.scriptGoogleUrl}?action=readClients`, { method:'GET', redirect:'follow' });
                const data = await res.json();
                if(Array.isArray(data)) setBancoDB(data);
            } catch { toast.error('Erro ao buscar clientes.'); }
            setLoadingDB(false);
        };

        const salvarDespesa = () => {
            if(!novaDespesa.nome || !novaDespesa.valor) return;
            const upd = [...despesas, {...novaDespesa, id:Date.now(), valor:parseFloat(novaDespesa.valor)}];
            setDespesas(upd);
            localStorage.setItem('ls_despesas_v2', JSON.stringify(upd));
            setNovaDespesa({nome:'',valor:''});
            toast.success('Despesa adicionada!');
        };

        const removerDespesa = (id) => {
            const upd = despesas.filter(d=>d.id!==id);
            setDespesas(upd);
            localStorage.setItem('ls_despesas_v2', JSON.stringify(upd));
        };

        /** RECEITA REAL: soma os preços reais de cada cliente */
        const receitaTotal = useMemo(()=> bancoDB.reduce((acc,c)=>acc+(parseFloat(c.precoFinal)||0),0), [bancoDB]);
        const despesaTotal = useMemo(()=> despesas.reduce((acc,d)=>acc+(parseFloat(d.valor)||0),0), [despesas]);

        const iniciarConfirmacao = (c) => {
            let zap = c.whatsapp;
            if (!zap || String(zap).replace(/\D/g,'').length < 10) {
                const match = bancoDB.find(b => b.nome.toLowerCase().includes(c.nome.toLowerCase()) || c.nome.toLowerCase().includes(b.nome.toLowerCase()));
                if(match?.zap) zap = match.zap;
            }
            if (zap && String(zap).replace(/\D/g,'').length >= 10) {
                enviarConfirmacao(c, zap);
            } else {
                setClientePendente(c);
                setModalSelecionarContato(true);
            }
        };

        const enviarConfirmacao = (c, zap) => {
            let msg = c.tipo === 'studio'
                ? `Oiiiii, *${c.nome}* !!!\nSó pra confirmar seu horário amanhã às ${c.hora} no Studio 💜\n\n📍 Av. Prestes Maia, 221 - Jardim D'abril, Osasco\n\n⏰ Tolerância de 15 minutos. Te espero! 💜`
                : `Oiiiii, *${c.nome}* !!!\nPassando pra confirmar nosso atendimento a domicílio amanhã às ${c.hora} 💜\n\n${c.location && c.location.length > 5 ? `📍 ${c.location}` : '📍 Pode me confirmar o endereço certinho? 🥰'}\n\nQualquer imprevisto me avise!`;
            const link = gerarLinkWhatsApp(zap, msg);
            if(link) window.open(link,'_blank');
            else toast.error('Número inválido. Selecione manualmente.');
        };

        const abrirModalNiver = (c) => {
            setModalNiver(c);
            setDescontoNiver(0);
            // Monta mensagem padrão
            setMsgNiver(`Oiiii *${c.nome}*! 🎂🎉\n\nHoje é o seu dia especial e eu não poderia deixar passar sem te dar um abraço virtual e desejar um feliz aniversário! 🥳\n\nEspero que você realize tudo que desejar nesse novo ciclo que começa! 💜\n\nCom carinho, Le 💜`);
        };

        const atualizarMsgNiver = (cliente, desc) => {
            const base = `Oiiii *${cliente.nome}*! 🎂🎉\n\nHoje é o seu dia especial e eu não poderia deixar passar sem te dar um abraço virtual e desejar um feliz aniversário! 🥳\n\nEspero que você realize tudo que desejar nesse novo ciclo que começa!`;
            const extra = desc ? `\n\n${desc}` : '';
            setMsgNiver(`${base}${extra}\n\nCom carinho, Le 💜`);
        };

        const selecionarDescontoNiver = (valor) => {
            setDescontoNiver(valor);
            if (!modalNiver) return;
            if (valor === 0) {
                atualizarMsgNiver(modalNiver, '');
            } else {
                atualizarMsgNiver(modalNiver, `🎁 *Presente especial de aniversário:* ${valor}% OFF no seu próximo atendimento! É só me chamar para agendar. 😍`);
            }
        };

        const enviarMsgNiver = () => {
            if (!modalNiver) return;
            const link = gerarLinkWhatsApp(modalNiver.zap, msgNiver);
            if (link) window.open(link, '_blank');
            setModalNiver(null);
        };


            if(!modalAnalisar) return;
            setLoadingIA(true);
            setMsgIA('');
            const prompt = `Você é Leticia Souza (Le), Lash Designer do Studio Ls Cílios. Escreva uma mensagem WhatsApp carinhosa para a cliente ${modalAnalisar.nome} dizendo que sente falta dela. ${incentivoIA ? `Ofereça: ${incentivoIA}.` : 'Convide carinhosamente para agendar.'} Assine APENAS como "Com carinho, Le 💜". A mensagem deve estar 100% pronta, sem colchetes nem espaços a preencher.`;
            const resp = await chamarIA(prompt);
            setMsgIA(resp);
            setLoadingIA(false);
        };

        const isAniversariante = (d) => {
            if(!d) return false;
            const p = d.split('-');
            if(p.length!==3) return false;
            const now = new Date();
            return parseInt(p[2])===now.getDate() && parseInt(p[1])===(now.getMonth()+1);
        };

        const salvarNovoAgendamento = async (payload) => {
            setLoadingNovoAg(true);
            const ok = await salvarAgendamentoPlanilha(payload);
            if(ok) {
                await baixarClientes();
                if(payload.data === dataLote) sincronizarAgenda();
                toast.success('Agendamento salvo!');
                setModalNovoAg(false);
            } else {
                toast.error('Erro ao salvar. Tente novamente.');
            }
            setLoadingNovoAg(false);
        };

        return (
            <div style={{background:'white',borderRadius:20,border:'1.5px solid var(--border)',overflow:'hidden',boxShadow:'0 4px 32px rgba(109,40,217,0.08)',minHeight:600,display:'flex',flexDirection:'column'}}>
                <div style={{background:'linear-gradient(135deg,var(--plum),#9333ea)',padding:'20px 20px 0',color:'white'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
                        <div>
                            <h2 style={{margin:0,fontSize:22,color:'white'}}>Painel da Le</h2>
                            <p style={{margin:'4px 0 0',fontSize:13,opacity:0.75}}>{new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}</p>
                        </div>
                        <button onClick={onSair} style={{background:'rgba(255,255,255,0.15)',border:'none',color:'white',borderRadius:10,padding:'8px 12px',cursor:'pointer',fontSize:13,fontWeight:600}}>Sair</button>
                    </div>
                    <div style={{display:'flex',gap:4,overflowX:'auto'}}>
                        {[['agenda','📅 Agenda'],['clientes','👥 Clientes'],['financeiro','💰 Financeiro']].map(([k,l])=>(
                            <button key={k} onClick={()=>setAba(k)} style={{padding:'8px 16px',borderRadius:'10px 10px 0 0',border:'none',cursor:'pointer',fontWeight:700,fontSize:12,whiteSpace:'nowrap',transition:'all 0.15s',background:aba===k?'white':'transparent',color:aba===k?'var(--plum)':'rgba(255,255,255,0.7)'}}>
                                {l}
                            </button>
                        ))}
                    </div>
                </div>

                <div style={{flex:1,overflowY:'auto',padding:16}}>
                    {/* ABA AGENDA */}
                    {aba === 'agenda' && (
                        <div className="fade-up" style={{display:'flex',flexDirection:'column',gap:12}}>
                            <button className="btn-primary" onClick={()=>setModalNovoAg(true)}>+ Agendar Manualmente</button>
                            <div style={{display:'flex',gap:8}}>
                                <input type="date" className="input" style={{flex:1}} value={dataLote} onChange={e=>setDataLote(e.target.value)}/>
                                <button onClick={sincronizarAgenda} disabled={loadingSync} style={{padding:'0 16px',background:'var(--plum)',color:'white',border:'none',borderRadius:12,cursor:'pointer',fontWeight:700,minWidth:48}}>
                                    {loadingSync ? <div className="spinner" style={{width:16,height:16}}/> : '↻'}
                                </button>
                            </div>
                            {clientes.length === 0 ? (
                                <div style={{textAlign:'center',padding:'32px 0',color:'var(--ink-mid)'}}>
                                    <p style={{fontSize:28,marginBottom:8}}>📅</p>
                                    <p style={{fontSize:14}}>Nenhum cliente para esta data.</p>
                                    <p style={{fontSize:12}}>Clique em ↻ para sincronizar a agenda.</p>
                                </div>
                            ) : clientes.map(c=>(
                                <div key={c.id} className="card" style={{padding:'14px'}}>
                                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                                        <div>
                                            <p style={{margin:0,fontWeight:700,fontSize:14}}>{c.nome}</p>
                                            <div style={{display:'flex',gap:6,marginTop:4,flexWrap:'wrap'}}>
                                                <span className="tag tag-plum">{c.hora}</span>
                                                <span className={`tag ${c.tipo==='domicilio'?'tag-rose':'tag-green'}`}>
                                                    {c.tipo==='domicilio'?'🏠 Domicílio':'🏢 Studio'}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={()=>iniciarConfirmacao(c)} style={{width:'100%',padding:'10px',background:'#f0fdf4',border:'1.5px solid #bbf7d0',borderRadius:10,color:'#059669',fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,transition:'all 0.15s'}}
                                        onMouseEnter={e=>{e.currentTarget.style.background='#059669';e.currentTarget.style.color='white';}}
                                        onMouseLeave={e=>{e.currentTarget.style.background='#f0fdf4';e.currentTarget.style.color='#059669';}}>
                                        💬 Confirmar Presença
                                    </button>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* ABA CLIENTES */}
                    {aba === 'clientes' && (
                        <div className="fade-up">
                            <button onClick={baixarClientes} disabled={loadingDB} style={{width:'100%',padding:'10px',background:'var(--plum-light)',border:'1.5px solid #ddd6fe',borderRadius:10,color:'var(--plum)',fontWeight:700,fontSize:13,cursor:'pointer',marginBottom:12,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                                {loadingDB?<><div className="spinner spinner-dark" style={{width:14,height:14}}/>Carregando...</>:<>↻ Atualizar lista</>}
                            </button>

                            {/* Aniversariantes do dia em destaque */}
                            {bancoDB.filter(c=>isAniversariante(c.nascimento)).length > 0 && (
                                <div className="fade-up" style={{background:'linear-gradient(135deg,#fff1f4,#f5f3ff)',border:'2px solid var(--rose-mid)',borderRadius:16,padding:'14px 16px',marginBottom:16}}>
                                    <p style={{margin:'0 0 10px',fontWeight:800,fontSize:14,color:'var(--rose)'}}>🎂 Aniversariantes de hoje!</p>
                                    {bancoDB.filter(c=>isAniversariante(c.nascimento)).map((c,i)=>(
                                        <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'white',borderRadius:10,padding:'10px 12px',marginBottom:6,border:'1px solid var(--border)'}}>
                                            <div>
                                                <p style={{margin:0,fontWeight:700,fontSize:14}}>{c.nome} 🎉</p>
                                                <p style={{margin:'2px 0 0',fontSize:12,color:'var(--ink-mid)'}}>{c.zap}</p>
                                            </div>
                                            <button onClick={()=>abrirModalNiver(c)} style={{padding:'8px 14px',background:'linear-gradient(135deg,var(--rose),var(--plum))',border:'none',borderRadius:10,color:'white',fontWeight:700,fontSize:12,cursor:'pointer',whiteSpace:'nowrap'}}>
                                                🎁 Parabenizar
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}

                            <div style={{display:'flex',flexDirection:'column',gap:8}}>
                                {bancoDB.map((c,i)=>(
                                    <div key={i} className="card" style={{padding:'12px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                                        <div>
                                            <p style={{margin:0,fontWeight:700,fontSize:14,display:'flex',alignItems:'center',gap:6}}>
                                                {c.nome}
                                                {isAniversariante(c.nascimento) && <span style={{fontSize:16}}>🎂</span>}
                                            </p>
                                            <p style={{margin:'2px 0 0',fontSize:12,color:'var(--ink-mid)'}}>{c.zap}</p>
                                        </div>
                                        <div style={{display:'flex',gap:6,flexShrink:0}}>
                                            {isAniversariante(c.nascimento) && (
                                                <button onClick={()=>abrirModalNiver(c)} style={{padding:'6px 10px',background:'linear-gradient(135deg,var(--rose),var(--plum))',border:'none',borderRadius:8,color:'white',fontWeight:700,fontSize:11,cursor:'pointer'}}>🎁</button>
                                            )}
                                            {CONFIG.geminiProxyUrl && (
                                                <button onClick={()=>{setModalAnalisar(c);setIncentivoIA('');setMsgIA('');}} style={{padding:'6px 10px',background:'var(--plum-light)',border:'none',borderRadius:8,color:'var(--plum)',fontWeight:700,fontSize:11,cursor:'pointer'}}>Reconquistar</button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                                {bancoDB.length === 0 && !loadingDB && <p style={{textAlign:'center',color:'var(--ink-mid)',fontSize:14,padding:'24px 0'}}>Nenhum cliente ainda.</p>}
                            </div>
                        </div>
                    )}

                    {/* ABA FINANCEIRO */}
                    {aba === 'financeiro' && (
                        <div className="fade-up" style={{display:'flex',flexDirection:'column',gap:12}}>
                            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
                                {[
                                    {label:'Receita',  val:`R$ ${receitaTotal.toFixed(0)}`,  bg:'#f0fdf4', border:'#bbf7d0', color:'#059669'},
                                    {label:'Despesas', val:`R$ ${despesaTotal.toFixed(0)}`,  bg:'#fff1f2', border:'#fecdd3', color:'var(--rose)'},
                                    {label:'Lucro',    val:`R$ ${(receitaTotal-despesaTotal).toFixed(0)}`, bg:'#f0f9ff', border:'#bae6fd', color:'#0284c7'},
                                ].map(({label,val,bg,border,color})=>(
                                    <div key={label} style={{background:bg,border:`1.5px solid ${border}`,borderRadius:12,padding:'10px 8px',textAlign:'center'}}>
                                        <p style={{margin:0,fontSize:10,fontWeight:700,color,textTransform:'uppercase',letterSpacing:'0.5px'}}>{label}</p>
                                        <p style={{margin:'4px 0 0',fontWeight:800,fontSize:16,color}}>{val}</p>
                                    </div>
                                ))}
                            </div>

                            <div style={{background:'#f9fafb',borderRadius:14,padding:'14px',border:'1px solid #e5e7eb'}}>
                                <p style={{margin:'0 0 10px',fontWeight:700,fontSize:14}}>Nova despesa</p>
                                <input className="input" style={{marginBottom:8}} placeholder="Nome da despesa (ex: Luz)" value={novaDespesa.nome} onChange={e=>setNovaDespesa(d=>({...d,nome:e.target.value}))}/>
                                <div style={{display:'flex',gap:8}}>
                                    <input className="input" type="number" placeholder="R$ 0,00" value={novaDespesa.valor} onChange={e=>setNovaDespesa(d=>({...d,valor:e.target.value}))}/>
                                    <button onClick={salvarDespesa} style={{padding:'0 20px',background:'var(--rose)',color:'white',border:'none',borderRadius:12,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>Adicionar</button>
                                </div>
                            </div>

                            <div>
                                <p style={{fontWeight:700,fontSize:14,marginBottom:8}}>Histórico de despesas</p>
                                {despesas.length === 0 && <p style={{color:'var(--ink-mid)',fontSize:13}}>Nenhuma despesa cadastrada.</p>}
                                {despesas.map(d=>(
                                    <div key={d.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',background:'white',border:'1.5px solid var(--border)',borderRadius:10,marginBottom:6}}>
                                        <span style={{fontSize:13,fontWeight:600}}>{d.nome}</span>
                                        <div style={{display:'flex',alignItems:'center',gap:10}}>
                                            <span style={{fontWeight:800,color:'var(--rose)',fontSize:14}}>- R$ {parseFloat(d.valor).toFixed(2)}</span>
                                            <button onClick={()=>removerDespesa(d.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#d1d5db',fontSize:16}} title="Remover">✕</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>

                {/* Modal de Aniversário */}
                {modalNiver && (
                    <div className="modal-overlay" onClick={()=>setModalNiver(null)}>
                        <div className="modal-box" style={{padding:0,overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
                            {/* Header festivo */}
                            <div style={{background:'linear-gradient(135deg,var(--rose),var(--plum))',padding:'24px 20px',textAlign:'center',position:'relative'}}>
                                <button onClick={()=>setModalNiver(null)} style={{position:'absolute',top:12,right:12,background:'rgba(255,255,255,0.2)',border:'none',color:'white',borderRadius:'50%',width:28,height:28,cursor:'pointer',fontSize:14}}>✕</button>
                                <div style={{fontSize:48,marginBottom:8}}>🎂</div>
                                <h3 style={{margin:0,color:'white',fontSize:20}}>Parabéns, {modalNiver.nome.split(' ')[0]}!</h3>
                                <p style={{margin:'6px 0 0',color:'rgba(255,255,255,0.85)',fontSize:13}}>Envie uma mensagem especial agora 💜</p>
                            </div>

                            <div style={{padding:'20px'}}>
                                {/* Seletor de desconto */}
                                <p style={{margin:'0 0 10px',fontWeight:700,fontSize:13,color:'var(--ink)'}}>Quer dar um presente especial?</p>
                                <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:16}}>
                                    {[0, 10, 15, 20, 30].map(v => (
                                        <button key={v} onClick={()=>selecionarDescontoNiver(v)}
                                            style={{padding:'8px 14px',borderRadius:10,border:'1.5px solid',cursor:'pointer',fontWeight:700,fontSize:13,transition:'all 0.15s',
                                                borderColor: descontoNiver===v ? 'var(--rose)' : 'var(--border)',
                                                background:  descontoNiver===v ? 'var(--rose-light)' : 'white',
                                                color:       descontoNiver===v ? 'var(--rose)' : 'var(--ink-mid)'}}>
                                            {v === 0 ? '🚫 Sem desconto' : `🎁 ${v}% OFF`}
                                        </button>
                                    ))}
                                </div>

                                {/* Preview / edição da mensagem */}
                                <p style={{margin:'0 0 6px',fontWeight:700,fontSize:13,color:'var(--ink)'}}>Mensagem (pode editar):</p>
                                <textarea
                                    value={msgNiver}
                                    onChange={e=>setMsgNiver(e.target.value)}
                                    style={{width:'100%',minHeight:140,padding:'10px 12px',border:'1.5px solid var(--border)',borderRadius:12,fontSize:13,fontFamily:'DM Sans,sans-serif',resize:'vertical',lineHeight:1.6,color:'var(--ink)'}}
                                />

                                <button onClick={enviarMsgNiver}
                                    style={{marginTop:12,width:'100%',padding:'14px',background:'#25D366',border:'none',borderRadius:12,color:'white',fontWeight:800,fontSize:15,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,boxShadow:'0 4px 16px rgba(37,211,102,0.3)',transition:'all 0.2s'}}
                                    onMouseEnter={e=>e.currentTarget.style.background='#1ebd59'}
                                    onMouseLeave={e=>e.currentTarget.style.background='#25D366'}>
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                                    Enviar no WhatsApp
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                {/* Modal selecionar contato */}
                {modalSelecionarContato && (
                    <ModalSelecionarContato
                        clientes={bancoDB}
                        onSelect={c=>{ enviarConfirmacao(clientePendente, c.zap); setModalSelecionarContato(false); setClientePendente(null); }}
                        onClose={()=>{ setModalSelecionarContato(false); setClientePendente(null); }}
                    />
                )}

                {/* Modal novo agendamento */}
                {modalNovoAg && (
                    <ModalNovoAgendamento
