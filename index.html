                        onClose={()=>setModalNovoAg(false)}
                        onSalvar={salvarNovoAgendamento}
                        loading={loadingNovoAg}
                    />
                )}

                {/* Modal Reconquistar IA */}
                {modalAnalisar && (
                    <div className="modal-overlay" onClick={()=>setModalAnalisar(null)}>
                        <div className="modal-box" style={{padding:'20px 24px'}} onClick={e=>e.stopPropagation()}>
                            <div style={{display:'flex',justifyContent:'space-between',marginBottom:16,alignItems:'center'}}>
                                <h3 style={{margin:0,fontSize:18}}>Reconquistar {modalAnalisar.nome.split(' ')[0]}</h3>
                                <button className="btn-ghost" onClick={()=>setModalAnalisar(null)}>✕</button>
                            </div>
                            <p style={{fontSize:13,color:'var(--ink-mid)',marginBottom:12}}>Oferta de incentivo (opcional):</p>
                            <input className="input" style={{marginBottom:12}} placeholder="Ex: 15% de desconto" value={incentivoIA} onChange={e=>setIncentivoIA(e.target.value)}/>
                            {!msgIA && <button className="btn-primary" onClick={gerarMsgIA} disabled={loadingIA}>{loadingIA?<><div className="spinner"/>Gerando...</>:'✨ Gerar mensagem'}</button>}
                            {msgIA && (
                                <div className="fade-up">
                                    <textarea style={{width:'100%',minHeight:140,padding:'10px',border:'1.5px solid var(--border)',borderRadius:12,fontSize:13,fontFamily:'DM Sans,sans-serif',resize:'vertical',marginBottom:10}} value={msgIA} onChange={e=>setMsgIA(e.target.value)}/>
                                    <button className="btn-primary" style={{background:'#25D366'}} onClick={()=>{const l=gerarLinkWhatsApp(modalAnalisar.zap,msgIA);if(l)window.open(l,'_blank');}}>
                                        💬 Enviar no WhatsApp
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                )}
            </div>
        );
    }

    // =============================================
    // MODAL: Selecionar Contato
    // =============================================
    function ModalSelecionarContato({ clientes, onSelect, onClose }) {
        const [busca, setBusca] = useState('');
        const filtrados = useMemo(()=>
            clientes.filter(c=>c.nome.toLowerCase().includes(busca.toLowerCase())||c.zap.includes(busca))
        ,[clientes, busca]);

        return (
            <div className="modal-overlay" onClick={onClose}>
                <div className="modal-box" style={{maxHeight:'80vh',display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>
                    <div style={{background:'var(--plum)',padding:'16px 20px',color:'white',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <h3 style={{margin:0,fontSize:16,color:'white'}}>Selecionar Contato</h3>
                        <button onClick={onClose} style={{background:'none',border:'none',color:'white',cursor:'pointer',fontSize:20}}>✕</button>
                    </div>
                    <div style={{padding:'10px 12px',borderBottom:'1px solid var(--border)'}}>
                        <input className="input" placeholder="Buscar por nome..." value={busca} onChange={e=>setBusca(e.target.value)} autoFocus/>
                    </div>
                    <div style={{flex:1,overflowY:'auto',padding:'8px'}}>
                        {filtrados.map((c,i)=>(
                            <button key={i} onClick={()=>onSelect(c)} style={{width:'100%',padding:'12px',border:'none',borderRadius:10,background:'white',cursor:'pointer',textAlign:'left',display:'flex',justifyContent:'space-between',transition:'background 0.1s',marginBottom:4}}
                                onMouseEnter={e=>e.currentTarget.style.background='var(--plum-light)'}
                                onMouseLeave={e=>e.currentTarget.style.background='white'}>
                                <span style={{fontWeight:700,fontSize:14}}>{c.nome}</span>
                                <span style={{fontSize:12,color:'var(--ink-mid)'}}>{c.zap}</span>
                            </button>
                        ))}
                        {filtrados.length === 0 && <p style={{textAlign:'center',color:'var(--ink-mid)',padding:'24px 0',fontSize:13}}>Nenhuma cliente encontrada.</p>}
                    </div>
                </div>
            </div>
        );
    }

    // =============================================
    // MODAL: Novo Agendamento Manual
    // =============================================
    function ModalNovoAgendamento({ onClose, onSalvar, loading }) {
        const [form, setForm] = useState({ nome:'', whatsapp:'', servico:'', data:'', hora:'', nascimento:'' });
        const [sabeNasc, setSabeNasc] = useState(false);
        const [errors, setErrors] = useState({});

        const duracaoServico = useMemo(()=>{
            if(form.servico === 'Design de Sobrancelhas') return 0.5;
            const s = CONFIG.servicos.find(s=>s.nome===form.servico);
            return s ? s.duracao : 2;
        },[form.servico]);

        const setField = (k,v) => { setForm(f=>({...f,[k]:v})); setErrors(e=>({...e,[k]:null})); };

        const handleSave = () => {
            const e = {};
            if(!form.nome.trim()) e.nome='Obrigatório';
            if(!form.servico) e.servico='Selecione um serviço';
            if(!form.data) e.data='Obrigatório';
            if(!form.hora) e.hora='Selecione um horário';
            setErrors(e);
            if(Object.keys(e).length>0) return;
            onSalvar({...form, nascimento:sabeNasc?form.nascimento:'', duracaoTotal:duracaoServico, tipoServico:'Manual', precoFinal:0, tipoAtendimento:'studio', endereco:''});
        };

        return (
            <div className="modal-overlay" onClick={onClose}>
                <div className="modal-box" style={{maxHeight:'90vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
                    <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'white',zIndex:1}}>
                        <h3 style={{margin:0,fontSize:16}}>Agendamento Manual</h3>
                        <button className="btn-ghost" onClick={onClose}>✕</button>
                    </div>
                    <div style={{padding:'16px 20px',display:'flex',flexDirection:'column',gap:14}}>
                        <div>
                            <label style={{fontSize:12,fontWeight:700,color:'var(--ink-mid)',textTransform:'uppercase',display:'block',marginBottom:6}}>Nome *</label>
                            <input className={`input ${errors.nome?'input-error':''}`} placeholder="Nome da cliente" value={form.nome} onChange={e=>setField('nome',e.target.value)}/>
                        </div>
                        <div>
                            <label style={{fontSize:12,fontWeight:700,color:'var(--ink-mid)',textTransform:'uppercase',display:'block',marginBottom:6}}>WhatsApp</label>
                            <input className="input" type="tel" placeholder="(11) 99999-9999" value={form.whatsapp} onChange={e=>setField('whatsapp',formatarTelefone(e.target.value))} maxLength={15}/>
                        </div>
                        <div style={{background:'#f9fafb',borderRadius:12,padding:'10px 12px',border:'1px solid #e5e7eb'}}>
                            <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
                                <input type="checkbox" style={{accentColor:'var(--rose)'}} checked={sabeNasc} onChange={e=>setSabeNasc(e.target.checked)}/>
                                <span style={{fontSize:13,fontWeight:600}}>Sabe o aniversário? 🎂</span>
                            </label>
                            {sabeNasc && <input type="date" className="input" style={{marginTop:8}} value={form.nascimento} onChange={e=>setField('nascimento',e.target.value)}/>}
                        </div>
                        <div>
                            <label style={{fontSize:12,fontWeight:700,color:'var(--ink-mid)',textTransform:'uppercase',display:'block',marginBottom:6}}>Serviço *</label>
                            <select className={`input ${errors.servico?'input-error':''}`} value={form.servico} onChange={e=>setField('servico',e.target.value)}>
                                <option value="" disabled>Selecione...</option>
                                <option>Design de Sobrancelhas</option>
                                {CONFIG.servicos.map(s=><option key={s.id}>{s.nome}</option>)}
                            </select>
                        </div>
                        <div>
                            <label style={{fontSize:12,fontWeight:700,color:'var(--ink-mid)',textTransform:'uppercase',display:'block',marginBottom:6}}>Data *</label>
                            <input type="date" className={`input ${errors.data?'input-error':''}`} value={form.data} onChange={e=>{setField('data',e.target.value);setField('hora','');}}/>
                        </div>
                        {form.data && form.servico && (
                            <div className="fade-up">
                                <label style={{fontSize:12,fontWeight:700,color:'var(--ink-mid)',textTransform:'uppercase',display:'block',marginBottom:8}}>Horário *</label>
                                <SeletorHorario data={form.data} duracaoHoras={duracaoServico} horaSelecionada={form.hora} onSelect={h=>setField('hora',h)}/>
                                {errors.hora && <p style={{color:'var(--rose)',fontSize:11,marginTop:4}}>{errors.hora}</p>}
                            </div>
                        )}
                        <button className="btn-primary" onClick={handleSave} disabled={loading}>
                            {loading?<><div className="spinner"/>Salvando...</>:'📅 Salvar Agendamento'}
                        </button>
                    </div>
                </div>
            </div>
        );
    }

    // =============================================
    // LOGIN
    // =============================================
    function TelaLogin({ onLogin }) {
        const [pass, setPass] = useState('');
        const [erro, setErro] = useState(false);
        const [show, setShow] = useState(false);

        const tentar = () => {
            if(btoa(pass) === CONFIG.senhaAdminHash) onLogin();
            else { setErro(true); setPass(''); }
        };

        return (
            <div className="fade-up" style={{background:'white',borderRadius:20,border:'1.5px solid var(--border)',padding:'32px 24px',maxWidth:360,margin:'0 auto',textAlign:'center',boxShadow:'0 4px 32px rgba(109,40,217,0.08)'}}>
                <div style={{width:64,height:64,background:'var(--plum-light)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px',fontSize:28}}>🔒</div>
                <h2 style={{margin:'0 0 6px',fontSize:22}}>Área Profissional</h2>
                <p style={{color:'var(--ink-mid)',fontSize:13,marginBottom:24}}>Acesso restrito à Le</p>
                <div style={{position:'relative',marginBottom:12}}>
                    <input type={show?'text':'password'} className={`input ${erro?'input-error':''}`} placeholder="Senha" value={pass} onChange={e=>{setPass(e.target.value);setErro(false);}} onKeyDown={e=>e.key==='Enter'&&tentar()} style={{paddingRight:44}}/>
                    <button onClick={()=>setShow(s=>!s)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--ink-mid)',fontSize:16}}>{show?'🙈':'👁️'}</button>
                </div>
                {erro && <p style={{color:'var(--rose)',fontSize:12,marginBottom:12,fontWeight:600}}>Senha incorreta!</p>}
                <button className="btn-primary" onClick={tentar}>Entrar</button>
                <button className="btn-ghost" style={{marginTop:12,fontSize:13,display:'block',width:'100%'}} onClick={()=>window.location.reload()}>Voltar</button>
            </div>
        );
    }

    // =============================================
    // APP RAIZ
    // =============================================
    function App() {
        const [tela, setTela]         = useState('cliente');
        const [agendado, setAgendado] = useState(null);

        return (
            <div style={{minHeight:'100vh',background:'var(--surface)',padding:'16px',display:'flex',flexDirection:'column',alignItems:'center'}}>
                {/* Header */}
                <div style={{width:'100%',maxWidth:440,marginBottom:20,textAlign:'center'}}>
                    <img src="img/logo.png" alt="Logo Ls Cílios" style={{width:120,height:'auto',objectFit:'contain'}} onError={e=>{e.target.style.display='none'}}/>
                    <h1 style={{margin:'8px 0 0',fontSize:24,fontFamily:'Playfair Display,serif'}}>
                        Ls <span style={{color:'var(--rose)'}}>Cílios</span>
                    </h1>
                    <p style={{margin:'4px 0 0',fontSize:12,color:'var(--ink-mid)'}}>Studio de beleza — Osasco, SP</p>
                </div>

                <div style={{width:'100%',maxWidth:440}}>
                    {tela === 'cliente'     && <TelaCliente aoFinalizar={d=>{setAgendado(d);setTela('sucesso');}}/>}
                    {tela === 'sucesso'     && <TelaSucesso dados={agendado} onReiniciar={()=>{ setAgendado(null); setTela('cliente'); window.scrollTo(0,0); }}/>}
                    {tela === 'login'       && <TelaLogin onLogin={()=>setTela('profissional')}/>}
                    {tela === 'profissional'&& <TelaProfissional onSair={()=>setTela('cliente')}/>}
                </div>

                {/* Link área profissional (só visível na tela cliente) */}
                {(tela === 'cliente' || tela === 'sucesso') && (
                    <div style={{marginTop:32,textAlign:'center'}}>
                        <button onClick={()=>setTela('login')} style={{background:'none',border:'none',cursor:'pointer',fontSize:12,color:'#d1d5db',display:'flex',alignItems:'center',gap:4,margin:'0 auto'}}>
                            🔒 Área Profissional
                        </button>
                    </div>
                )}
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
