        // --- 3. FUNÇÕES GLOBAIS ---

            if(!value) return "";
            const numero = value.replace(/\D/g, "");
            if (numero.length <= 11) {
                return numero.replace(/^(\d{2})(\d{0,5})(\d{0,4}).*/, "($1) $2-$3").replace(/-$/, ''); 
            } else {
                return numero.substring(0, 11).replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
            }
        };

            if (!zapLimpo.startsWith('55')) {

        const gerarHorarios = (dateStr) => {
            if (!dateStr) return [];
            const dia = new Date(dateStr + 'T12:00:00').getDay();
            
            let horaInicio = 0, minInicio = 0;
            let horaFim = 0, minFim = 0;

            // Regras fornecidas pela Letícia:
            if (dia === 2) { horaInicio = 13; minInicio = 0; horaFim = 20; minFim = 0; } // Terça
            else if (dia === 3) { horaInicio = 11; minInicio = 0; horaFim = 18; minFim = 0; } // Quarta
            else if (dia === 4) { horaInicio = 13; minInicio = 0; horaFim = 20; minFim = 0; } // Quinta
            else if (dia === 5) { horaInicio = 12; minInicio = 0; horaFim = 16; minFim = 30; } // Sexta
            else if (dia === 6) { horaInicio = 9; minInicio = 0; horaFim = 14; minFim = 0; } // Sábado
            else return []; // Domingo (0) e Segunda (1) fechado

            const lista = [];
            let minutosAtuais = horaInicio * 60 + minInicio;
            const minutosFinais = horaFim * 60 + minFim;

            // Gera horários de 30 em 30 minutos
            while (minutosAtuais < minutosFinais) {
                const h = Math.floor(minutosAtuais / 60);
                const m = minutosAtuais % 60;
                const horarioFormatado = `${h < 10 ? '0' + h : h}:${m === 0 ? '00' : m}`;
                lista.push(horarioFormatado);
                minutosAtuais += 30;
            }
            return lista;
        };

        function ModalNovoAgendamentoManual({ isOpen, onClose, onSalvar, loading }) {
            const [nome, setNome] = useState('');
            const [whatsapp, setWhatsapp] = useState('');
            const [data, setData] = useState('');
            const [hora, setHora] = useState('');
            const [servicoNome, setServicoNome] = useState('');
            const [sabeNascimento, setSabeNascimento] = useState(false);
            const [nascimento, setNascimento] = useState('');

            const [horariosDisponiveis, setHorariosDisponiveis] = useState([]);
            const [horariosOcupadosLocal, setHorariosOcupadosLocal] = useState([]);
            const [carregandoHorariosLocal, setCarregandoHorariosLocal] = useState(false);

            const verificarAgenda = async (dataSelecionada) => {
                setCarregandoHorariosLocal(true);
                const slots = gerarHorarios(dataSelecionada);
                setHorariosDisponiveis(slots);
                
                try {
                    // LÊ A AGENDA DIRETO DO GOOGLE APPS SCRIPT
                    const url = `${CONFIG.scriptGoogleUrl}?action=get_agenda&date=${dataSelecionada}`;
                    const response = await fetch(url, { method: 'GET', redirect: 'follow' });
                    const responseText = await response.text();
                    
                    let eventos = [];
                    try {
                        eventos = JSON.parse(responseText);
                    } catch (e) {
                         console.error("Não foi possível processar a resposta como JSON:", responseText);
                    }
                    
                    const ocupados = [];
                    if (Array.isArray(eventos)) {
                        eventos.forEach(ev => {
                            if (ev.isAllDay) {
                                slots.forEach(h => { if (!ocupados.includes(h)) ocupados.push(h); });
                            } else {
                                slots.forEach(slot => {
                                    const [sh, sm] = slot.split(':').map(Number);
                                    const slotStartMinutes = sh * 60 + sm;
                                    const slotEndMinutes = slotStartMinutes + 30; // Blocos de 30 min

                                    const evStartMinutes = ev.startHour * 60 + ev.startMin;
                                    const evEndMinutes = ev.endHour * 60 + ev.endMin;

                                    if (slotStartMinutes < evEndMinutes && slotEndMinutes > evStartMinutes) {
                                        if (!ocupados.includes(slot)) ocupados.push(slot);
                                    }
                                });
                            }
                        });
                    }
                    setHorariosOcupadosLocal(ocupados);
                } catch (e) {
                    console.error("Erro ao ler agenda viva:", e);
                }
                setCarregandoHorariosLocal(false);
            };

            useEffect(() => { 
                if (data) { 
                    verificarAgenda(data); 
                    setHora(''); 
                } 
            }, [data]);

            if (!isOpen) return null;

            const handleSave = () => {
                if (!nome || !data || !hora) {
                    alert("Nome, Data e Hora são obrigatórios para agendar!");
                    return;
                }
                if (!servicoNome) {
                    alert("Por favor, selecione o serviço que será realizado.");
                    return;
                }
                
                const payload = {
                    nome: nome,
                    whatsapp: whatsapp,
                    servico: servicoNome,
                    data: data,
                    hora: hora,
                    nascimento: sabeNascimento ? nascimento : "",
                    duracaoTotal: servicoNome === "Design de Sobrancelhas" ? 0.5 : 2, 
                    tipoServico: "Agendamento Manual",
                    precoFinal: 0,
                    tipoAtendimento: "studio",
                    endereco: ""
                };
                
                onSalvar(payload);
            };

            // Cálculo dos blocos que o serviço ocupa (Cada slot tem 30 min = 0.5h)
            let duracaoServico = 2; // Padrão 2h para manual
            if (servicoNome === "Design de Sobrancelhas") duracaoServico = 0.5;
            
            const slotsNecessarios = Math.ceil(duracaoServico / 0.5);

            return (
                <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 fade-in" onClick={onClose}>

                        <div className="space-y-3">

                                <label className="text-xs font-bold text-gray-500 mb-1 block">Nome da Cliente *</label>

                            <div>
                                <label className="text-xs font-bold text-gray-500 mb-1 block">WhatsApp</label>
                                <input type="tel" placeholder="(11) 99999-9999" className="w-full p-2 border rounded-lg text-sm" value={whatsapp} onChange={e => setWhatsapp(formatarTelefone(e.target.value))} maxLength="15" />

                            <div className="bg-gray-50 p-2 rounded-lg border border-gray-100">
                                <div className="flex items-center gap-2 mb-2">
                                    <input type="checkbox" id="checkNiverManual" checked={sabeNascimento} onChange={e => setSabeNascimento(e.target.checked)} className="w-4 h-4 text-purple-500 rounded cursor-pointer" />
                                    <label htmlFor="checkNiverManual" className="text-xs font-bold text-gray-600 cursor-pointer">Sabe o dia de aniversário da cliente?</label>
                                </div>
                                {sabeNascimento && (
                                    <input type="date" className="w-full p-2 border rounded-lg text-sm fade-in" value={nascimento} onChange={e => setNascimento(e.target.value)} />
                                )}
                            </div>
                            
                            <div>
                                <label className="text-xs font-bold text-gray-500 mb-1 block">Serviço *</label>
                                <select className="w-full p-2 border rounded-lg text-sm bg-white" value={servicoNome} onChange={e => setServicoNome(e.target.value)}>
                                    <option value="" disabled>Selecione um serviço...</option>
                                    <option value="Design de Sobrancelhas">Design de Sobrancelhas</option>
                                    {CONFIG.servicos.map(s => <option key={s.id} value={s.nome}>{s.nome}</option>)}
                                </select>
                            </div>

                            <div>
                                <label className="text-xs font-bold text-gray-500 mb-1 block">Data *</label>

                            </div>
                            
                            {data && (
                                <div className="pt-1">
                                    <label className="block text-xs font-bold text-gray-500 mb-1">Horário Livre *</label>

                                        <p className="text-xs text-purple-500 font-bold animate-pulse">Verificando agenda da Le...</p>
                                    ) : horariosDisponiveis.length === 0 ? (

                                        <div className="grid grid-cols-4 gap-2 max-h-[120px] overflow-y-auto pr-1">
                                            {horariosDisponiveis.map((h, index) => {
                                                // MÁGICA: Verifica se tem tempo livre suficiente ANTES de fechar o salão
                                                let isOcupado = false;
                                                for (let i = 0; i < slotsNecessarios; i++) {
                                                    const idxToCheck = index + i;
                                                    if (idxToCheck >= horariosDisponiveis.length) {
                                                        isOcupado = true; // Tempo do salão acaba antes do serviço terminar!
                                                        break;
                                                    }
                                                    const hourToCheck = horariosDisponiveis[idxToCheck];
                                                    if (horariosOcupadosLocal.includes(hourToCheck)) {
                                                        isOcupado = true; // Bate em outro agendamento!
                                                        break;
                                                    }
                                                }

                                                return (
                                                    <button 
                                                        key={h} 
                                                        disabled={isOcupado} 
                                                        onClick={() => setHora(h)} 
                                                        className={`p-2 rounded text-xs font-bold border transition-all ${isOcupado ? 'bg-gray-100 text-gray-300 border-gray-100 cursor-not-allowed opacity-50' : hora === h ? 'bg-pink-500 text-white border-pink-500 shadow-md transform scale-105' : 'bg-white text-gray-600 border-gray-200 hover:border-pink-300'}`}
                                                    >

                                                )

                            )}
                            
                            <button onClick={handleSave} disabled={loading} className="w-full mt-2 bg-gradient-to-r from-purple-600 to-pink-500 text-white font-bold py-3 rounded-lg flex justify-center items-center gap-2 shadow-md hover:shadow-lg transition-all">
                                {loading ? 'Agendando...' : <><Icons.Calendar /> Salvar na Agenda</>}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- TELA CLIENTE PRINCIPAL ---
        function TelaCliente({ aoFinalizar }) {
            const [step, setStep] = useState(0); 
            const [dados, setDados] = useState({ 
                nome: '', whatsapp: '', email: '', nascimento: '', 
                servicoObj: null, tipoServico: '', precoFinal: 0, 
                incluiSobrancelha: false, duracaoTotal: 0,
                data: '', hora: '', tipoAtendimento: 'studio', endereco: '', complemento: ''

            const [servicoExpandido, setServicoExpandido] = useState(null);
            const [modalDetalhes, setModalDetalhes] = useState(null); 
            const [depoimentoIndex, setDepoimentoIndex] = useState(0);

            const [loadingSalvar, setLoadingSalvar] = useState(false);
            const [sabeNascimento, setSabeNascimento] = useState(false);

            const hoje = new Date().toISOString().split('T')[0];

            useEffect(() => { const interval = setInterval(() => { setDepoimentoIndex((prev) => (prev + 1) % CONFIG.depoimentos.length); }, 5000); return () => clearInterval(interval); }, []);

            const verificarAgendaCliente = async (data) => {
                setCarregandoHorariosLocal(true);
                const slots = gerarHorarios(data);
                setHorariosDisponiveis(slots);
                
                try {
                    // LÊ A AGENDA DIRETO DO GOOGLE APPS SCRIPT
                    const url = `${CONFIG.scriptGoogleUrl}?action=get_agenda&date=${data}`;
                    const response = await fetch(url, { method: 'GET', redirect: 'follow' });
                    const responseText = await response.text();
                    
                    let eventos = [];
                    try {
                        eventos = JSON.parse(responseText);
                    } catch (e) {
                         console.error("Não foi possível processar a resposta como JSON:", responseText);
                    }
                    
                    const ocupados = [];
                    if (Array.isArray(eventos)) {
                        eventos.forEach(ev => {
                            if (ev.isAllDay) {
                                slots.forEach(h => { if (!ocupados.includes(h)) ocupados.push(h); });
                            } else {
                                slots.forEach(slot => {
                                    const [sh, sm] = slot.split(':').map(Number);
                                    const slotStartMinutes = sh * 60 + sm;
                                    const slotEndMinutes = slotStartMinutes + 30; // 30 mins!

                                    const evStartMinutes = ev.startHour * 60 + ev.startMin;
                                    const evEndMinutes = ev.endHour * 60 + ev.endMin;

                                    if (slotStartMinutes < evEndMinutes && slotEndMinutes > evStartMinutes) {
                                        if (!ocupados.includes(slot)) ocupados.push(slot);
                                    }
                                });
                            }
                        });
                    }
                    setHorariosOcupadosLocal(ocupados);
                } catch (e) {
                    console.error("Erro agenda cliente:", e);
                }
                setCarregandoHorariosLocal(false);
            };

            useEffect(() => { if (dados.data) { verificarAgendaCliente(dados.data); } }, [dados.data]);

            const selecionarCategoria = (tipo) => {
                if (tipo === 'cilios') { setDados({...dados, incluiSobrancelha: false}); setStep(1); } 
                else if (tipo === 'sobrancelha') {
                    const s = {...CONFIG.sobrancelha, precos: { aplicacao: CONFIG.sobrancelha.preco, manutencao: CONFIG.sobrancelha.preco }};
                    // Sobrancelha = 0.5h (30 min)
                    setDados({...dados, servicoObj: s, tipoServico: 'aplicacao', precoFinal: s.preco, incluiSobrancelha: false, duracaoTotal: 0.5});
                    setStep(2); 
                } 
                else if (tipo === 'combo') { setDados({...dados, incluiSobrancelha: true}); setStep(1); }
            };

            const toggleCombo = () => {
                setDados(prev => ({ ...prev, incluiSobrancelha: !prev.incluiSobrancelha }));
            };

            // LÓGICA MÁGICA DOS TEMPOS E PREÇOS 
            const selecionarServico = (servico, tipo) => {
                let preco = servico.precos[tipo];
                let isCombo = dados.incluiSobrancelha;
                let duracao = 2;
                
                if (servico.id === 999) { 
                    isCombo = false; 
                    duracao = 0.5; // Sobrancelha: 30min
                } else {
                    if (isCombo) { 
                        duracao = 2; // Combo é sempre 2 horas de acordo com a Le!
                        preco += CONFIG.sobrancelha.preco; 
                    } 
                    else if (tipo === 'aplicacao') { 
                        duracao = 2; // Aplicação 2 horas
                    } 
                    else if (tipo === 'manutencao') { 
                        duracao = 1.5; // Manutenção 1h30
                    } 
                    else if (tipo === 'remocao') { 
                        duracao = 0.5; // Remoção 30 min
                    }
                }
                
                setDados({ ...dados, servicoObj: servico, tipoServico: tipo, precoFinal: preco, duracaoTotal: duracao, incluiSobrancelha: isCombo });
                setModalDetalhes(null);
                setStep(2);

            const confirmarHorario = () => {
                setDados({ ...dados, hora: horarioPendente });

            const handlePhoneChange = (e) => {
                const formatted = formatarTelefone(e.target.value);
                setDados({ ...dados, whatsapp: formatted });

            const salvarEAvancar = async () => {

                if (dados.tipoAtendimento === 'domicilio' && (!dados.endereco || dados.endereco.trim().length < 10)) { 
                    alert("Endereço muito curto. Por favor, preencha o endereço completo."); return; 
                }

                setLoadingSalvar(true);
                const dadosParaSalvar = { ...dados, nascimento: sabeNascimento ? dados.nascimento : '' };
                await salvarAgendamentoPlanilha(dadosParaSalvar);
                setLoadingSalvar(false);
                aoFinalizar(dadosParaSalvar);

            // Cálculo dos blocos de 30 minutos (Ex: 2h / 0.5h = 4 blocos necessários)
            const slotsNecessarios = Math.ceil((dados.duracaoTotal || 2) / 0.5);

                                <button onClick={() => selecionarCategoria('sobrancelha')} className="w-full bg-white border border-purple-200 p-4 rounded-xl flex items-center justify-between hover:bg-purple-50 card-hover transition-all"><div className="flex items-center gap-3"><span className="text-2xl">✏️</span><div className="text-left"><span className="block font-bold text-gray-700">Sobrancelhas</span><span className="text-xs text-gray-400">Design Simples (30min)</span></div></div><span className="text-purple-300">➜</span></button>

                                {/* DEPOIMENTOS DAS CLIENTES */}

                                    <div className="bg-pink-50/50 p-4 rounded-2xl relative">
                                        <span className="text-2xl absolute -top-3 -left-2 opacity-50">💬</span>

                        {step === 1 && (
                            <div className="fade-in space-y-4">
                                <button onClick={() => setStep(0)} className="text-xs text-gray-400 mb-2 hover:text-pink-500 flex items-center gap-1">← Voltar</button>
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-xl font-bold text-gray-800">Escolha o Modelo</h2>
                                </div>
                                <div className="mb-4 p-3 bg-gradient-to-r from-pink-50 to-purple-50 rounded-xl border border-pink-100 flex items-center justify-between shadow-sm">
                                    <div className="flex items-center gap-2"><span className="text-xl">✨</span><div><p className="text-sm font-bold text-gray-800">Adicionar Sobrancelha?</p><p className="text-xs text-gray-500">+ Design Simples (+R$35)</p></div></div>
                                    <div className="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in"><input type="checkbox" className="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer" checked={dados.incluiSobrancelha} onChange={toggleCombo}/><label className={`toggle-label block overflow-hidden h-6 rounded-full cursor-pointer ${dados.incluiSobrancelha ? 'bg-pink-500' : 'bg-gray-300'}`}></label></div>
                                </div>
                                <div className="space-y-4">{CONFIG.servicos.map((s) => !s.isSobrancelha && (
                                    <div key={s.id} className="border border-pink-100 rounded-xl overflow-hidden bg-white shadow-sm hover:shadow-md transition-all">
                                        <div onClick={() => setServicoExpandido(servicoExpandido === s.id ? null : s.id)} className="w-full text-left p-4 flex gap-4 items-center bg-gray-50 hover:bg-pink-50 transition-colors relative cursor-pointer">
                                            <div className="w-16 h-16 shrink-0 bg-white rounded-lg border border-pink-100 overflow-hidden relative group"><img src={s.imagem} alt={s.nome} className="w-full h-full object-cover" onError={(e) => { e.target.style.display = 'none'; }} /><div className="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity" onClick={(e) => { e.stopPropagation(); setModalDetalhes(s); }}><Icons.Info className="text-white"/></div></div>
                                            <div className="flex-1"><div className="flex justify-between items-start"><span className="font-bold text-gray-700 block">{s.nome}</span><button onClick={(e) => { e.stopPropagation(); setModalDetalhes(s); }} className="text-pink-400 hover:text-pink-600 text-xs px-2 py-1 rounded bg-pink-50"><Icons.Info /></button></div><span className="text-[10px] text-gray-500 line-clamp-2 mt-1">{s.desc}</span></div>
                                            <div className="text-pink-400 pl-2">{servicoExpandido === s.id ? '▼' : '▶'}</div>
                                        </div>
                                        {servicoExpandido === s.id && (<div className="p-3 bg-white grid gap-2 animate-in fade-in slide-in-from-top-2 border-t border-pink-50"><button onClick={() => selecionarServico(s, 'aplicacao')} className="w-full text-left p-3 rounded-lg border border-gray-100 hover:border-pink-300 hover:bg-pink-50 flex justify-between items-center group"><span className="text-sm font-medium text-gray-600 group-hover:text-pink-600">✨ Aplicação Nova</span><span className="font-bold text-pink-500">R$ {s.precos.aplicacao + (dados.incluiSobrancelha ? 35 : 0)}</span></button><button onClick={() => selecionarServico(s, 'manutencao')} className="w-full text-left p-3 rounded-lg border border-gray-100 hover:border-purple-300 hover:bg-purple-50 flex justify-between items-center group"><span className="text-sm font-medium text-gray-600 group-hover:text-purple-600">🔧 Manutenção</span><span className="font-bold text-purple-500">R$ {s.precos.manutencao + (dados.incluiSobrancelha ? 35 : 0)}</span></button><button onClick={() => selecionarServico(s, 'remocao')} className="w-full text-left p-3 rounded-lg border hover:bg-red-50 flex justify-between items-center group"><span className="text-sm font-medium text-gray-600 group-hover:text-red-600">🧼 Remoção</span><span className="font-bold text-red-400">R$ {s.precos.remocao + (dados.incluiSobrancelha ? 35 : 0)}</span></button></div>)}
                                    </div>
                                ))}</div>
                            </div>
                        )}
                        {step === 2 && (
                            <div className="fade-in space-y-3">
                                <button onClick={() => setStep(1)} className="text-xs text-gray-400">← Voltar</button>
                                <div className="bg-pink-50 p-3 rounded-lg text-center border border-pink-100">
                                    <p className="font-bold text-pink-600 text-sm">{dados.servicoObj.nome} {dados.incluiSobrancelha && !dados.servicoObj.nome.includes("Sobrancelhas") ? "+ Sobrancelha" : ""}</p>
                                    <p className="text-xs text-gray-600 uppercase">{dados.tipoServico} - R$ {dados.precoFinal}</p>
                                </div>
                                <div className="mb-4 bg-white border border-gray-100 rounded-xl p-3 shadow-sm">
                                    <h3 className="text-xs font-bold text-gray-500 mb-2 uppercase flex items-center gap-1">Antes de vir:</h3>
                                    <div className="grid grid-cols-2 gap-2 text-[10px] text-gray-600">
                                        {/* MOSTRAMOS O TEMPO LINDINHO AQUI */}
                                        <div className="flex items-center gap-1"><Icons.Clock /><span>Duração: {formatarDuracao(dados.duracaoTotal)}</span></div>
                                        <div className="flex items-center gap-1"><Icons.EyeOff /><span>Sem Rímel</span></div>
                                        <div className="flex items-center gap-1"><span>👓</span><span>Remover Lentes</span></div>
                                        <div className="flex items-center gap-1"><span>⏰</span><span>Tolerância 15min</span></div>
                                    </div>
                                    <div className="mt-2 pt-2 border-t border-gray-100 text-[9px] text-red-400 leading-tight">⚠️ <strong>Contraindicações:</strong> Alergias, doenças oculares ativas (conjuntivite) ou pele extremamente sensível.</div>
                                </div>
                                
                                <input type="text" className="w-full p-3 border rounded-xl text-sm" placeholder="Seu Nome *" value={dados.nome} onChange={e => setDados({...dados, nome: e.target.value})} />
                                <input type="tel" className="w-full p-3 border rounded-xl text-sm" placeholder="WhatsApp (DDD) *" value={dados.whatsapp} onChange={handlePhoneChange} maxLength="15" />
                                <input type="email" className="w-full p-3 bg-white rounded-xl border border-gray-200 text-sm text-gray-900 placeholder-gray-400" placeholder="E-mail" value={dados.email} onChange={(e) => setDados({...dados, email: e.target.value})} />
                                
                                <div className="bg-gray-50 p-3 rounded-xl border border-gray-200">
                                    <div className="flex items-center gap-2 mb-2">
                                        <input type="checkbox" id="checkNiver" checked={sabeNascimento} onChange={e => setSabeNascimento(e.target.checked)} className="w-4 h-4 text-pink-500 rounded cursor-pointer" />
                                        <label htmlFor="checkNiver" className="text-xs font-bold text-gray-600 cursor-pointer">Gostaria de informar sua data de aniversário? 🎂</label>
                                    </div>
                                    {sabeNascimento && (
                                        <div className="fade-in mt-2">
                                            <input type="date" className="w-full p-3 bg-white rounded-xl border border-gray-200 text-sm text-gray-900" value={dados.nascimento} onChange={(e) => setDados({...dados, nascimento: e.target.value})} />
                                        </div>
                                    )}
                                </div>

                                <div className="p-3 bg-gray-50 rounded-xl border border-gray-200">
                                    <label className="block text-xs font-bold text-gray-500 mb-2">ONDE SERÁ O ATENDIMENTO?</label>
                                    <div className="flex gap-2 mb-3">
                                        <button onClick={() => setDados({...dados, tipoAtendimento: 'studio'})} className={`flex-1 py-2 text-xs rounded-lg border font-bold ${dados.tipoAtendimento === 'studio' ? 'bg-pink-500 text-white' : 'bg-white'}`}>No Studio</button>
                                        <button onClick={() => setDados({...dados, tipoAtendimento: 'domicilio'})} className={`flex-1 py-2 text-xs rounded-lg border font-bold ${dados.tipoAtendimento === 'domicilio' ? 'bg-pink-500 text-white' : 'bg-white'}`}>A Domicílio</button>
                                    </div>
                                    {dados.tipoAtendimento === 'domicilio' && (
                                        <div className="fade-in space-y-2">
                                            <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-2 text-[10px] text-yellow-800 mb-2">⚠️ Taxa de Uber será cobrada.</div>
                                            <input type="text" className="w-full p-3 bg-white rounded-xl border border-gray-200 text-sm text-gray-900 placeholder-gray-400" placeholder="Endereço Completo *" value={dados.endereco} onChange={(e) => setDados({...dados, endereco: e.target.value})} />
                                            <input type="text" className="w-full p-3 bg-white rounded-xl border border-gray-200 text-sm text-gray-900 placeholder-gray-400" placeholder="Complemento" value={dados.complemento} onChange={(e) => setDados({...dados, complemento: e.target.value})} />
                                        </div>
                                    )}
                                </div>
                                <div className="pt-2">
                                    <label className="block text-xs font-bold text-gray-500 mb-1">ESCOLHA DATA E HORA</label>
                                    <input type="date" min={hoje} className="w-full p-3 bg-white rounded-xl border border-gray-200 mb-3 font-bold text-gray-700" value={dados.data} onChange={(e) => { setDados({...dados, data: e.target.value, hora: ''}); }} />
                                    {dados.data && (
                                        <div className="grid grid-cols-4 gap-2 pb-2 mt-2">
                                            {carregandoHorariosLocal ? <p className="col-span-4 text-center text-xs text-gray-400">Verificando agenda...</p> : 
                                            horariosDisponiveis.map((h, index) => {
                                                // MÁGICA: Verifica se tem tempo livre suficiente ANTES de fechar o salão
                                                let isOcupado = false;
                                                for (let i = 0; i < slotsNecessarios; i++) {
                                                    const idxToCheck = index + i;
                                                    if (idxToCheck >= horariosDisponiveis.length) {
                                                        isOcupado = true; // O salão fecha antes de o serviço acabar!
                                                        break;
                                                    }
                                                    const hourToCheck = horariosDisponiveis[idxToCheck];
                                                    if (horariosOcupadosLocal.includes(hourToCheck)) {
                                                        isOcupado = true; // Existe outro agendamento neste bloco!
                                                        break;
                                                    }
                                                }
                                                return (<button key={h} disabled={isOcupado} onClick={() => { setHorarioPendente(h); setModalConfirmacao(true); }} className={`p-2 rounded text-xs font-bold border transition-all ${isOcupado ? 'bg-gray-100 text-gray-300 border-gray-100 cursor-not-allowed opacity-50' : dados.hora === h ? 'bg-pink-500 text-white border-pink-500 shadow-md transform scale-105' : 'bg-white text-gray-600 border-gray-200 hover:border-pink-300'}`}>{h}</button>)
                                            })}
                                        </div>
                                    )}
                                </div>
                                {dados.hora && (
                                    <div className="fade-in space-y-3 pt-2">
                                        <button 
                                            onClick={salvarEAvancar} 
                                            disabled={loadingSalvar}
                                            className={`w-full bg-gradient-to-r from-purple-600 to-purple-800 text-white font-bold py-4 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 mt-2 flex items-center justify-center gap-2 ${loadingSalvar ? 'opacity-75 cursor-wait' : ''}`}
                                        >
                                            {loadingSalvar ? 'Processando...' : 'AGENDAR E ENVIAR ZAP'} <Icons.Whatsapp />
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                    {/* MODAIS (Detalhes, Confirmação) */}
                    {modalDetalhes && (
                        <div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 fade-in" onClick={() => setModalDetalhes(null)}>
                            <div className="bg-white rounded-3xl w-full max-w-sm overflow-hidden relative" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setModalDetalhes(null)} className="absolute top-3 right-3 bg-black/50 text-white rounded-full p-1 z-10"><Icons.Close /></button>
                                <div className="h-64 bg-gray-100"><img src={modalDetalhes.imagem} className="w-full h-full object-cover" /></div>
                                <div className="p-6">
                                    <h3 className="text-2xl font-bold text-gray-800 mb-2">{modalDetalhes.nome}</h3>
                                    <p className="text-gray-600 text-sm leading-relaxed mb-6 text-justify">{modalDetalhes.fullDesc || modalDetalhes.desc}</p>
                                    <button onClick={() => setModalDetalhes(null)} className="w-full bg-gray-100 text-gray-600 font-bold py-3 rounded-xl hover:bg-gray-200">Fechar</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {modalConfirmacao && (
                        <div className="fixed inset-0 bg-black/60 z-[70] flex items-center justify-center p-4 fade-in">
                            <div className="bg-white rounded-2xl p-6 w-full max-w-xs text-center shadow-2xl border border-pink-100">
                                <div className="text-pink-500 text-3xl mb-3">⏰</div>
                                <h3 className="font-bold text-gray-800 mb-2">Confirmar Horário?</h3>
                                <p className="text-sm text-gray-500 mb-6">Você escolheu as <strong className="text-pink-500">{horarioPendente}</strong>.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setModalConfirmacao(false)} className="flex-1 py-3 rounded-xl text-xs font-bold text-gray-400 bg-gray-100">Voltar</button>
                                    <button onClick={confirmarHorario} className="flex-1 py-3 rounded-xl text-xs font-bold bg-pink-500 text-white">Confirmar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- TELA PROFISSIONAL ---
        function TelaProfissional({ onSair }) {
            const [aba, setAba] = useState('confirma'); 
            const [dataLote, setDataLote] = useState(new Date().toISOString().split('T')[0]);
            const [listaClientes, setListaClientes] = useState([]);
            const [bancoClientes, setBancoClientes] = useState([]);
            const [loadingSync, setLoadingSync] = useState(false);
            const [loadingPlanilha, setLoadingPlanilha] = useState(false);
            const [despesas, setDespesas] = useState([]); 
            
            // Modais e Aniversário
            const [modalReconquistar, setModalReconquistar] = useState(null); 
            const [modalNiver, setModalNiver] = useState(null);
            const [temDesconto, setTemDesconto] = useState(false);
            const [valorDesconto, setValorDesconto] = useState(10);
            
            // Modais de Cadastro e Contato
            const [modalSelecionarContato, setModalSelecionarContato] = useState(false);
            const [clienteParaConfirmar, setClienteParaConfirmar] = useState(null);
            const [modalNovoAgendamento, setModalNovoAgendamento] = useState(false);
            const [loadingSalvarAgendamento, setLoadingSalvarAgendamento] = useState(false);

            useEffect(() => {
                const saved = localStorage.getItem('ls_despesas');
                if(saved) setDespesas(JSON.parse(saved));
                baixarClientesPlanilha();
            }, []);

            const sincronizarGoogleAgenda = async () => { 
                setLoadingSync(true); 
                try {
                    const url = `${CONFIG.scriptGoogleUrl}?action=get_agenda&date=${dataLote}`;
                    const response = await fetch(url, { method: 'GET', redirect: 'follow' });
                    const responseText = await response.text();
                    let eventos = [];
                    try {
                        eventos = JSON.parse(responseText);
                    } catch (e) {
                        console.error("Não foi possível processar a resposta como JSON:", responseText);
                    }

                    if (Array.isArray(eventos)) {
                        const listaFinal = eventos.filter(ev => !ev.isAllDay).map(ev => {
                            const whatsMatch = ev.description ? ev.description.match(/(?:Whats|Whatsapp)[a-z]*:\s*([+\d() -]+)/i) : null;
                            const zap = whatsMatch ? whatsMatch[1].trim() : null;

                            const loc = ev.location ? ev.location.toLowerCase() : "";
                            const tipo = (!loc || loc.length < 5 || loc.includes('studio') || loc.includes('prestes')) ? 'studio' : 'domicilio';

                            return {
                                id: Math.random(),
                                nome: ev.title ? ev.title.replace(/^Cílios:\s*/i, '').trim() : 'Cliente',
                                hora: (ev.startHour < 10 ? '0'+ev.startHour : ev.startHour) + ":" + (ev.startMin < 10 ? '0'+ev.startMin : ev.startMin),
                                tipo: tipo,
                                whatsapp: zap,
                                location: ev.location
                            };
                        });
                        
                        listaFinal.sort((a,b) => a.hora.localeCompare(b.hora));
                        setListaClientes(listaFinal);
                    } else {
                        console.error("Erro na resposta da agenda:", eventos);
                    }
                } catch (e) {
                    console.error("Erro sincronização de profissionais", e);
                }
                setLoadingSync(false); 
            };

            const baixarClientesPlanilha = async () => {
                setLoadingPlanilha(true);
                try {
                    const res = await fetch(`${CONFIG.scriptGoogleUrl}?action=readClients`, { method: 'GET', redirect: 'follow' });
                    const data = await res.json();
                    if (Array.isArray(data)) setBancoClientes(data);
                } catch (e) { console.error(e); }
                setLoadingPlanilha(false);
            };

            const handleSalvarAgendamentoManual = async (novoAgendamento) => {
                setLoadingSalvarAgendamento(true);
                
                await salvarAgendamentoPlanilha(novoAgendamento);
                await baixarClientesPlanilha(); 
                
                if (novoAgendamento.data === dataLote) {
                    sincronizarGoogleAgenda();
                }
                
                setLoadingSalvarAgendamento(false);
                setModalNovoAgendamento(false);
                alert("Agendamento salvo com sucesso!");
            };
            
            const iniciarConfirmacao = (cliente) => {
                let zap = cliente.whatsapp;
                let zapLimpo = zap ? String(zap).replace(/\D/g, '') : '';
                
                if (zapLimpo.length < 10) {
                    const clienteEncontrado = bancoClientes.find(c => 
                        cliente.nome.toLowerCase().includes(c.nome.toLowerCase()) || 
                        c.nome.toLowerCase().includes(cliente.nome.toLowerCase())
                    );
                    if (clienteEncontrado && clienteEncontrado.zap) {
                        zap = clienteEncontrado.zap;
                        zapLimpo = String(zap).replace(/\D/g, '');
                    }
                }

                if (zapLimpo.length >= 10) {
                    enviarMensagemConfirmacao(cliente, zap);
                } else {
                    setClienteParaConfirmar(cliente);
                    setModalSelecionarContato(true);
                }
            };
            
            const selecionarContatoEConfirmar = (contatoSelecionado) => {
                if (clienteParaConfirmar) {
                    enviarMensagemConfirmacao(clienteParaConfirmar, contatoSelecionado.zap);
                    setModalSelecionarContato(false);
                    setClienteParaConfirmar(null);
                }
            };

            const enviarMensagemConfirmacao = (cliente, zapForcado = null) => {
                let msg = "";
                if (cliente.tipo === 'studio') {
                    msg = `Oiiiii, *${cliente.nome}* !!!\nSó pra confirmar seu horário amanhã às ${cliente.hora} no Studio 💜\n\n📍endereço:\nAv. Prestes Maia, 221 - Jardim D’abril, Osasco\n\n⏰ Só para lembrar que temos uma tolerância de 15 minutos de atraso.\n\nTe espero 💜`;
                } else {
                    const loc = cliente.location ? cliente.location.toLowerCase() : "";
                    const semEndereco = !cliente.location || loc === 'domicilio' || loc.length < 5;
                    
                    if (semEndereco) {
                         msg = `Oiiiii, *${cliente.nome}* !!!\nPassando pra confirmar nosso atendimento a domicílio amanhã às ${cliente.hora} 💜\n\n📍 *Poderia me confirmar seu endereço certinho, por favor?* 🥰\n\nQualquer imprevisto me avise!`;
                    } else {
                         msg = `Oiiiii, *${cliente.nome}* !!!\nPassando pra confirmar nosso atendimento a domicílio amanhã às ${cliente.hora} 💜\n\n📍No endereço: ${cliente.location}\n\nQualquer imprevisto me avise! 🥰`;
                    }
                }
                
                let numProcessar = zapForcado || cliente.whatsapp;
                const link = gerarLinkWhatsApp(numProcessar, msg);
                
                if (link) {
                    window.open(link, '_blank');
                } else {
                    alert("⚠️ O número desta cliente está vazio ou inválido. Por favor, pesquise o nome dela na lista manualmente.");
                    setClienteParaConfirmar(cliente);
                    setModalSelecionarContato(true);
                }
            };

            const abrirModalNiver = (cliente) => {
                setModalNiver(cliente);
                setTemDesconto(false);
            };

            const enviarMensagemNiver = () => {
                if (!modalNiver) return;
                const primeiroNome = modalNiver.nome.split(' ')[0];
                const msgDesconto = temDesconto ? valorDesconto + '% OFF' : 'uma surpresa';
                const msgFinal = CONFIG.mensagensPadrao.aniversario.replace('{nome}', primeiroNome).replace('{desconto}', msgDesconto);
                const link = gerarLinkWhatsApp(modalNiver.zap, msgFinal);
                if(link) window.open(link, '_blank');
                setModalNiver(null);
            };

            // LÓGICA DE RECONQUISTA (SEM IA)
            const abrirModalReconquistar = (cliente) => {
                const primeiroNome = cliente.nome.split(' ')[0];
                const msgBase = CONFIG.mensagensPadrao.reconquistar.replace('{nome}', primeiroNome).replace('{incentivo}', '');
                setModalReconquistar({ cliente: cliente, incentivo: '', resultado: msgBase });
            };

            const atualizarMensagemReconquista = (incentivoTexto) => {
                const primeiroNome = modalReconquistar.cliente.nome.split(' ')[0];
                const textoIncentivoFinal = incentivoTexto ? `Preparei um mimo para você: ${incentivoTexto}. ` : '';
                const msgBase = CONFIG.mensagensPadrao.reconquistar.replace('{nome}', primeiroNome).replace('{incentivo}', textoIncentivoFinal);
                setModalReconquistar(prev => ({ ...prev, incentivo: incentivoTexto, resultado: msgBase }));
            };

            const enviarMensagemAnalise = () => {
                if(!modalReconquistar || !modalReconquistar.cliente || !modalReconquistar.resultado) return;
                const link = gerarLinkWhatsApp(modalReconquistar.cliente.zap, modalReconquistar.resultado);
                if(link) window.open(link, '_blank');
            };
            
            const isAniversariante = (dataNasc) => {
                if (!dataNasc) return false;
                const parts = dataNasc.split('-');
                if(parts.length !== 3) return false;
                const hoje = new Date();
                return parseInt(parts[2]) === hoje.getDate() && parseInt(parts[1]) === (hoje.getMonth() + 1);
            };

            return (
                <div className="bg-white rounded-3xl shadow-xl overflow-hidden border border-purple-100 fade-in relative min-h-[600px] flex flex-col">
                    <button onClick={onSair} className="absolute top-4 right-4 text-white z-10"><Icons.LogOut /></button>
                    <div className="bg-purple-600 p-6 text-white">
                        <h2 className="text-xl font-bold">Painel da Le</h2>
                        <div className="flex gap-4 mt-4 text-[10px] font-bold overflow-x-auto no-scrollbar whitespace-nowrap">
                            {['confirma', 'financeiro', 'clientes'].map(t => (
                                <button key={t} onClick={() => setAba(t)} className={`pb-1 border-b-2 uppercase ${aba === t ? 'border-white text-white' : 'border-transparent text-purple-300'}`}>{t}</button>
                            ))}
                        </div>
                    </div>
                    
                    {aba === 'confirma' && (
                        <div className="p-4 flex-1 flex flex-col gap-4 fade-in">
                            <button onClick={() => setModalNovoAgendamento(true)} className="w-full bg-gradient-to-r from-purple-600 to-pink-500 text-white font-bold py-3 rounded-xl text-sm flex justify-center items-center gap-2 shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-0.5">
                                <Icons.Plus /> Agendar Manualmente
                            </button>
                            <div className="bg-gray-50 p-4 rounded-xl border flex gap-2"><input type="date" className="flex-1 p-2 rounded-lg border text-sm" value={dataLote} onChange={e => setDataLote(e.target.value)} /><button onClick={sincronizarGoogleAgenda} className="bg-blue-600 text-white px-3 rounded-lg text-xs font-bold">{loadingSync ? '...' : <Icons.Refresh />}</button></div>
                            <div className="flex-1 overflow-y-auto space-y-2">
                                {listaClientes.length === 0 && !loadingSync && (
                                    <p className="text-center text-gray-400 text-sm py-8">Nenhum cliente agendado para esta data.</p>
                                )}
                                {listaClientes.map((c) => (
                                    <div key={c.id} className="p-3 rounded-xl border flex flex-col gap-2 bg-white">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <p className="font-bold text-sm text-gray-800">{c.nome}</p>
                                                <div className="flex items-center gap-2 mt-1">
                                                    <span className="bg-gray-100 text-xs px-1.5 rounded text-gray-600 font-bold">{c.hora}</span>
                                                    <span className={`text-[10px] px-2 py-0.5 rounded ${c.tipo === 'domicilio' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'}`}>
                                                        {c.tipo === 'domicilio' ? '🏠 Casa' : '🏢 Studio'}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                        <button onClick={() => iniciarConfirmacao(c)} className="w-full py-2 rounded-lg text-xs bg-green-500 text-white font-bold flex justify-center items-center gap-1 shadow-sm hover:bg-green-600 transition-all"><Icons.Whatsapp /> Confirmar</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                    {aba === 'financeiro' && <TelaFinanceiro listaClientes={listaClientes} despesas={despesas} setDespesas={setDespesas} />}
                    
                    {aba === 'clientes' && (
                        <div className="p-4 flex-1 flex flex-col gap-4 fade-in overflow-y-auto">
                            <button onClick={baixarClientesPlanilha} className="w-full bg-green-100 text-green-700 font-bold py-2 rounded-lg text-xs flex justify-center items-center gap-1"><Icons.Refresh /> Atualizar Lista</button>
                            
                            {bancoClientes.map((c, i) => (
                                <div key={i} className="p-3 rounded-xl border mb-2 bg-white flex justify-between items-center">
                                    <div className="flex flex-col"><p className="font-bold text-sm text-gray-700">{c.nome}</p><p className="text-[10px] text-gray-400">{c.zap}</p></div>
                                    <div className="flex gap-2">
                                        {/* Botão de mensagem padrão de reconquista ao invés de IA */}
                                        <button onClick={() => abrirModalReconquistar(c)} className="bg-purple-100 text-purple-600 py-1 px-2 rounded text-[10px] font-bold flex items-center gap-1"><Icons.MessageSquare /> Mensagem</button>
                                        {isAniversariante(c.nascimento) && <button onClick={() => abrirModalNiver(c)} className="bg-pink-100 text-pink-600 py-1 px-2 rounded text-[10px] font-bold flex items-center gap-1"><Icons.Cake /> Parabéns</button>}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* MODAIS GERAIS DA TELA PROFISSIONAL */}
                    <ModalSelecionarContato 
                        isOpen={modalSelecionarContato} 
                        onClose={() => setModalSelecionarContato(false)}
                        clientes={bancoClientes}
                        onSelect={selecionarContatoEConfirmar}
                    />

                    <ModalNovoAgendamentoManual
                        isOpen={modalNovoAgendamento}
                        onClose={() => setModalNovoAgendamento(false)}
                        onSalvar={handleSalvarAgendamentoManual}
                        loading={loadingSalvarAgendamento}
                    />

                    {modalNiver && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 fade-in">
                            <div className="bg-white rounded-3xl w-full max-w-md overflow-hidden relative transform scale-100 transition-all shadow-2xl">
                                <div className="modal-gradient p-8 text-center flex flex-col items-center justify-center relative h-96">
                                    <button onClick={()=>setModalNiver(null)} className="absolute top-4 right-4 text-gray-500 hover:text-gray-800 bg-white/50 rounded-full p-1"><Icons.Close /></button>
                                    <div className="text-7xl mb-4 animate-bounce filter drop-shadow-md">🎂</div>
                                    <h3 className="font-bold text-3xl text-purple-800 mb-2">Parabéns, {modalNiver.nome.split(' ')[0]}!</h3>
                                    <p className="text-purple-600 text-base mb-8 font-medium">Vamos mimar essa cliente especial?</p>
                                    <div className="w-full space-y-4">
                                        <div className="flex gap-3 justify-center">
                                            <button onClick={()=>setTemDesconto(true)} className={`flex-1 py-4 rounded-2xl text-sm font-bold border-2 shadow-sm transition-all transform hover:-translate-y-1 ${temDesconto?'bg-pink-50 text-pink-600 border-pink-400':'bg-white text-gray-500 border-gray-200'}`}>Sim, Desconto 🎁</button>
                                            <button onClick={()=>setTemDesconto(false)} className={`flex-1 py-4 rounded-2xl text-sm font-bold border-2 shadow-sm transition-all transform hover:-translate-y-1 ${!temDesconto?'bg-white text-gray-600 border-gray-300':'bg-white text-gray-400 border-gray-100'}`}>Só Mensagem 💌</button>
                                        </div>
                                        {temDesconto && (
                                            <div className="fade-in flex items-center justify-center gap-3 bg-white/80 p-3 rounded-2xl border border-pink-200 shadow-inner">
                                                <span className="text-xs font-bold text-gray-400 uppercase tracking-widest">Desconto:</span>
                                                <input type="number" className="w-24 p-2 border-b-2 border-pink-300 text-center font-bold text-pink-600 text-2xl focus:outline-none bg-transparent" value={valorDesconto} onChange={e=>setValorDesconto(e.target.value)} />
                                                <span className="text-2xl font-bold text-pink-400">%</span>
                                            </div>
                                        )}
                                        <button onClick={enviarMensagemNiver} className="w-full py-4 bg-[#25D366] hover:bg-[#1ebd59] text-white rounded-2xl font-bold shadow-lg flex justify-center items-center gap-3 transition-all transform hover:scale-105 active:scale-95 text-lg mt-4">
                                            <Icons.Whatsapp /> Enviar Mensagem Agora
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL DE RECONQUISTA (SEM IA) */}
                    {modalReconquistar && (
                        <div className="fixed inset-0 bg-black bg-opacity-80 z-50 flex items-center justify-center p-4 fade-in" onClick={() => setModalReconquistar(null)}>
                            <div className="bg-white rounded-3xl w-full max-w-sm overflow-hidden relative" onClick={e => e.stopPropagation()}>
                                <div className="bg-gradient-to-r from-purple-600 to-pink-500 p-4 text-white font-bold flex justify-between items-center">
                                    <h3 className="flex gap-2 items-center"><Icons.MessageSquare /> Reconquistar Cliente</h3>
                                    <button onClick={()=>setModalReconquistar(null)}><Icons.Close /></button>
                                </div>
                                <div className="p-5 space-y-4">
                                    <div className="fade-in">
                                        <p className="text-sm text-gray-600 mb-3">O que você gostaria de oferecer para <strong>{modalReconquistar.cliente.nome.split(' ')[0]}</strong> voltar?</p>
                                        <input 
                                            type="text" 
                                            placeholder="Ex: 15% de desconto, Design grátis, etc." 
                                            className="w-full p-3 border rounded-xl text-sm mb-4"
                                            value={modalReconquistar.incentivo}
                                            onChange={e => atualizarMensagemReconquista(e.target.value)}
                                        />
                                        
                                        <div className="bg-purple-50 p-2 rounded-lg border border-purple-100 mb-3"><p className="text-xs font-bold text-purple-700 flex items-center gap-1"><Icons.Check /> Mensagem Padrão Pronta!</p></div>
                                        
                                        <textarea className="w-full h-32 p-3 border rounded-xl text-sm bg-gray-50 text-gray-700 mb-2 focus:outline-none focus:border-purple-300" value={modalReconquistar.resultado} onChange={e => setModalReconquistar({...modalReconquistar, resultado: e.target.value})}></textarea>
                                        
                                        <button onClick={enviarMensagemAnalise} className="w-full mt-2 bg-[#25D366] text-white py-4 rounded-xl font-bold hover:bg-[#1ebd59] flex justify-center items-center gap-2 shadow-lg transition-transform hover:scale-105">
                                            Enviar Agora <Icons.Whatsapp />
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- COMPONENTE PRINCIPAL (APP) ---
        function App() {
            const [tela, setTela] = useState('cliente');
            const [dadosFinal, setDadosFinal] = useState(null);

            const handleSucesso = (dados) => {
                setDadosFinal(dados);
                setTela('sucesso');
            };

            const irWhatsapp = () => {
                if(!dadosFinal) return;
                const msg = `Olá! Agendei pelo site: ${dadosFinal.servicoObj ? dadosFinal.servicoObj.nome : dadosFinal.servico} - Dia ${dadosFinal.data.split('-').reverse().join('/')} às ${dadosFinal.hora}. Nome: ${dadosFinal.nome}`;
                const link = gerarLinkWhatsApp(CONFIG.telefoneProfissional, msg);
                if(link) window.open(link, '_blank');
            };

            return (
                <div className="min-h-screen bg-pink-50 p-4 font-sans flex flex-col items-center">
                    <div className="w-full max-w-md mb-4 text-center">
                        <img src="img/logo.png" alt="Logo" className="w-40 h-auto mb-2 object-contain mx-auto" onError={(e) => { e.target.style.display = 'none'; }} />
                        <h1 className="text-2xl font-bold text-gray-800">Ls <span className="text-pink-600">Cílios</span></h1>
                    </div>

                    {tela === 'sucesso' && (
                        <div className="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-6 animate-in">
                            <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center text-4xl text-green-500 mb-4 animate-bounce">✓</div>
                            <h2 className="text-2xl font-bold text-gray-800 mb-2">Agendado! 🎉</h2>
                            <p className="text-center text-gray-600 text-sm mb-8">Seu horário está pré-reservado. Envie a mensagem para confirmar.</p>
                            <div className="bg-pink-50 p-4 rounded-xl w-full max-w-xs mb-8 text-left border border-pink-100">
                                <p className="text-xs text-gray-500 uppercase font-bold mb-1">DETALHES:</p>
                                <p className="text-gray-800 font-bold">{dadosFinal?.servicoObj ? dadosFinal.servicoObj.nome : dadosFinal?.servico}</p>
                                <p className="text-gray-600 text-sm">{dadosFinal?.data.split('-').reverse().join('/')} às {dadosFinal?.hora}</p>
                            </div>
                            <button onClick={irWhatsapp} className="w-full max-w-xs bg-green-500 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 hover:bg-green-600 transition-all animate-pulse">
                                <Icons.Whatsapp /> Enviar no WhatsApp
                            </button>
                            <button onClick={() => window.location.reload()} className="mt-6 text-gray-400 text-xs underline">Voltar ao início</button>
                        </div>
                    )}

                    {tela === 'cliente' && (
                        <div className="w-full max-w-md">
                            <TelaCliente aoFinalizar={handleSucesso} />
                        </div>
                    )}
                    
                    {tela === 'login' && <div className="bg-white rounded-3xl shadow-xl overflow-hidden border border-purple-100"><TelaLogin onLogin={() => setTela('profissional')} /></div>}
                    
                    {tela === 'profissional' && <TelaProfissional onSair={() => setTela('cliente')} />}
                    
                    {tela !== 'login' && tela !== 'profissional' && tela !== 'sucesso' && (
                        <div className="mt-8 text-center"><button onClick={() => setTela('login')} className="text-xs text-gray-300 flex items-center justify-center gap-1 mx-auto"><Icons.Lock /> Área Profissional</button></div>
                    )}
                </div>
            );
        }

        // --- COMPONENTE LOGIN ---
        function TelaLogin({ onLogin }) {
            const [pass, setPass] = useState('');
            const [erro, setErro] = useState(false);
            const tentarLogin = () => { if(pass === CONFIG.senhaAdmin) { onLogin(); } else { setErro(true); } };
            return (
                <div className="flex items-center justify-center min-h-[300px] p-8 fade-in">
                    <div className="w-full max-w-xs text-center">
                        <div className="mb-4 text-purple-600 text-5xl"><Icons.Lock /></div>
                        <h2 className="text-xl font-bold text-gray-800 mb-4">Acesso Restrito</h2>
                        <input type="password" placeholder="Senha" className="w-full p-3 border rounded-xl mb-3 text-center" value={pass} onChange={e => {setPass(e.target.value); setErro(false);}} />
                        {erro && <p className="text-red-500 text-xs font-bold mb-3">Senha incorreta!</p>}
                        <button onClick={tentarLogin} className="w-full bg-purple-600 text-white font-bold py-3 rounded-xl hover:bg-purple-700">Entrar</button>
                        <button onClick={() => window.location.reload()} className="mt-4 text-xs text-gray-400 hover:text-gray-600">Voltar</button>
                    </div>
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
